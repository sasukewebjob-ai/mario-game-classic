<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Mario Bros - Enhanced</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden}
#wrap{position:relative;display:inline-block}
canvas{display:block;image-rendering:pixelated;border:3px solid #444}
#hud{width:800px;display:flex;justify-content:space-between;align-items:center;color:#fff;font-size:11px;padding:7px 14px;background:linear-gradient(to bottom,#1a1a2e,#111);border-bottom:2px solid #333;letter-spacing:1px}
#hud span{display:flex;flex-direction:column;align-items:center;gap:2px}
#hud label{color:#aaa;font-size:8px}
#hud b{color:#fff;font-size:13px}
#controls{width:800px;display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:linear-gradient(to bottom,#111,#0a0a0a);border-top:2px solid #333}
.btn-group{display:flex;gap:12px}
.ctrl-btn{width:60px;height:60px;border-radius:10px;border:2px solid #444;background:linear-gradient(145deg,#2c2c2c,#1a1a1a);color:#fff;font-size:22px;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:center;transition:all .08s;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 0 #000}
.ctrl-btn:active,.ctrl-btn.pressed{background:linear-gradient(145deg,#c0392b,#922b21);border-color:#e74c3c;transform:translateY(3px);box-shadow:0 1px 0 #000}
#btn-jump{width:70px;height:70px;border-radius:50%;background:linear-gradient(145deg,#c0392b,#922b21);border-color:#e74c3c;font-size:26px;box-shadow:0 5px 0 #6b1f1f}
#btn-jump:active,#btn-jump.pressed{transform:translateY(4px);box-shadow:0 1px 0 #6b1f1f}
#lives-icons{display:flex;gap:4px;align-items:center}
.hint{color:#444;font-size:8px;text-align:center;line-height:2}
</style>
</head>
<body>
<div id="wrap">
<div id="hud">
<span><label>MARIO</label><b id="hScore">000000</b></span>
<span><label>COIN</label><b id="hCoins">x00</b></span>
<span><label>WORLD</label><b id="hWorld">1-1</b></span>
<span><label>TIME</label><b id="hTime">400</b></span>
<div id="lives-icons"></div>
</div>
<canvas id="game" width="800" height="450"></canvas>
<div id="controls">
<div class="btn-group">
<button class="ctrl-btn" id="btn-left">&#9664;</button>
<button class="ctrl-btn" id="btn-right">&#9654;</button>
<button class="ctrl-btn" id="btn-down" style="font-size:14px">&#9660;</button>
</div>
<div class="hint">Arrows:Move Shift:Dash<br>Space/Up:Jump Z:Tongue/Fire</div>
<div class="btn-group">
<button class="ctrl-btn" id="btn-dash" style="font-size:13px">&#128168;</button>
<button class="ctrl-btn" id="btn-fire" style="font-size:18px">&#128293;</button>
<button class="ctrl-btn" id="btn-jump">&#8593;</button>
</div>
</div>
</div>
<script>
"use strict";
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=800,H=450,TILE=32,GRAVITY=0.52,LW=8000;

// === AUDIO ===
const AC=new(window.AudioContext||window.webkitAudioContext)();
let bgmGain=null;
function beep(freq,dur,type='square',vol=0.12,delay=0){
const t=AC.currentTime+delay,o=AC.createOscillator(),g=AC.createGain();
o.connect(g);g.connect(AC.destination);o.type=type;o.frequency.setValueAtTime(freq,t);
g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur+0.01);
}
function sfx(n){try{
if(n==='jump'){beep(220,.05,'square',.1);beep(440,.08,'square',.12,.04);beep(660,.06,'sine',.1,.1)}
if(n==='coin'){beep(988,.05,'sine',.18);beep(1319,.14,'sine',.18,.05)}
if(n==='stomp'){beep(180,.04,'sawtooth',.15);beep(120,.1,'sawtooth',.1,.04)}
if(n==='die'){beep(494,.07,'square',.15);beep(370,.07,'square',.12,.1);beep(277,.07,'square',.1,.2);beep(196,.4,'square',.1,.3)}
if(n==='break'){beep(320,.04,'sawtooth',.12);beep(220,.06,'sawtooth',.1,.04);beep(160,.08,'sawtooth',.08,.08)}
if(n==='qblock'){beep(660,.06,'sine',.18);beep(784,.06,'sine',.16,.06);beep(988,.12,'sine',.15,.12)}
if(n==='flag'){[523,659,784,1047].forEach((f,i)=>beep(f,.12,'sine',.2,i*.12))}
if(n==='power'){[262,330,392,524].forEach((f,i)=>beep(f,.08,'sine',.18,i*.08))}
if(n==='1up'){[784,988,784,988,1175,1319].forEach((f,i)=>beep(f,.07,'sine',.18,i*.07))}
if(n==='yoshi_mount'){beep(523,.06,'sine',.2);beep(659,.06,'sine',.2,.06);beep(784,.06,'sine',.2,.12);beep(1047,.12,'sine',.18,.18)}
if(n==='yoshi_tongue'){beep(300,.03,'sawtooth',.15);beep(500,.05,'sawtooth',.12,.03)}
if(n==='yoshi_eat'){beep(350,.04,'square',.15);beep(450,.04,'square',.12,.04);beep(550,.06,'sine',.1,.08)}
if(n==='yoshi_dismount'){beep(400,.06,'square',.15);beep(300,.08,'square',.12,.06);beep(200,.1,'square',.1,.12)}
if(n==='yoshi_egg'){beep(600,.04,'sine',.15);beep(800,.06,'sine',.12,.04)}
}catch(e){}}

const THEME_NOTES=[[330,2],[0,1],[330,1],[0,1],[330,2],[0,1],[262,1],[330,2],[392,4],[196,4],[262,3],[0,1],[196,3],[0,1],[164,3],[0,1],[220,2],[246,2],[233,1],[220,2],[0,1],[196,2],[330,2],[392,2],[440,2],[349,1],[392,1],[0,1],[330,2],[0,1],[262,2],[294,1],[247,2],[0,2],[262,3],[0,1],[196,3],[0,1],[164,3],[0,1],[220,2],[246,2],[233,1],[220,2],[0,1],[196,2],[330,2],[392,2],[440,2],[349,1],[392,1],[0,1],[330,2],[0,1],[262,2],[294,1],[247,2],[0,2]];
const UG_NOTES=[[131,2],[0,1],[131,1],[0,1],[165,2],[0,1],[131,1],[175,2],[165,2],[156,2],[147,4],[131,2],[0,1],[131,1],[0,1],[165,2],[0,1],[131,1],[175,2],[165,2],[156,2],[147,4],[110,2],[0,1],[110,1],[0,1],[131,2],[0,1],[110,1],[147,2],[131,2],[0,2]];
let bgmStep=0,bgmTime=0;const BEAT=0.09;
function scheduleBGM(){const notes=ugMode?UG_NOTES:THEME_NOTES;while(bgmTime<AC.currentTime+0.5){const[freq,len]=notes[bgmStep%notes.length];if(freq>0){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(bgmGain);o.type='square';o.frequency.value=freq;g.gain.setValueAtTime(0.08,bgmTime);g.gain.exponentialRampToValueAtTime(0.001,bgmTime+len*BEAT-0.01);o.start(bgmTime);o.stop(bgmTime+len*BEAT)}bgmTime+=len*BEAT;bgmStep++}}
function startBGM(){stopBGM();bgmGain=AC.createGain();bgmGain.gain.value=1;bgmGain.connect(AC.destination);bgmStep=0;bgmTime=AC.currentTime;scheduleBGM()}
function stopBGM(){if(bgmGain){bgmGain.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.2);bgmGain=null}}

// === GAME STATE ===
let state='start',score=0,coins=0,lives=3,timeLeft=400,timerTick=null,cam=0,frame=0;
let shakeX=0,shakeY=0,currentWorld=1,currentLevel=1,introTimer=0,goalSlide=null;
const platforms=[],pipes=[],coinItems=[],enemies=[],mushrooms=[],fireballs=[],piranhas=[];
const movingPlats=[],springs=[],hammers=[],cannons=[],bulletBills=[];
const particles=[],scorePopups=[],blockAnims=[];
let lastFireFrame=-999,ugMode=false,savedOW=null,starTimer=0,combo=0,comboTimer=0;
let checkpoint=null,checkpointReached=false;
const flagPole={x:LW-500,h:320};

// === YOSHI STATE ===
const yoshiEggs=[];  // thrown egg projectiles
const yoshiItems=[]; // hatching eggs on ground
let yoshi={x:0,y:0,w:30,h:40,vx:0,vy:0,alive:false,mounted:false,facing:1,walkFrame:0,walkTimer:0,
  tongueOut:0,tongueLen:0,tongueMaxLen:60,eatCount:0,eggsReady:0,onGround:false,
  runAway:false,runTimer:0,flutterTimer:0};

// === MARIO ===
const mario={x:80,y:H-3*TILE,w:26,h:32,vx:0,vy:0,onGround:false,facing:1,walkFrame:0,walkTimer:0,inv:0,dead:false,big:false,power:'none'};

function resetMario(){
const bh=mario.power!=='none'?48:32;
Object.assign(mario,{x:80,y:H-3*TILE,w:26,h:bh,vx:0,vy:0,onGround:false,facing:1,walkFrame:0,walkTimer:0,inv:0,dead:false});
cam=0;
}
function upgradeMario(type){
if(type==='flower')mario.power='fire';else mario.power='big';
if(!mario.big){mario.h=48;mario.y-=16}mario.big=true;sfx('power');
for(let i=0;i<20;i++)spawnParticle(mario.x+13,mario.y+24,'star');
}

// === LEVEL BUILDER ===
function addB(x,y,type,hasMush){platforms.push({x,y,w:TILE,h:TILE,type:type==='q'?'question':type==='g'?'ground':'brick',hit:false,hasMush:!!hasMush,bounceOffset:0})}
function addRow(x,y,n,t,hm){for(let i=0;i<n;i++)addB(x+i*TILE,y,t,hm&&i===Math.floor(n/2))}
function addStair(x,steps){for(let i=0;i<steps;i++)for(let j=0;j<=i;j++)addB(x+i*TILE,H-(j+2)*TILE,'g')}
function addStairD(x,steps){for(let i=0;i<steps;i++)for(let j=i;j<steps;j++)addB(x+i*TILE,H-(j+2)*TILE,'g')}

function buildLevel(){
[platforms,pipes,coinItems,enemies,mushrooms,fireballs,piranhas,particles,scorePopups,blockAnims,movingPlats,springs,cannons,bulletBills,yoshiEggs,yoshiItems].forEach(a=>a.length=0);
hammers.length=0;starTimer=0;combo=0;comboTimer=0;checkpointReached=false;checkpoint=null;goalSlide=null;ugMode=false;savedOW=null;
yoshi.alive=false;yoshi.mounted=false;yoshi.eatCount=0;yoshi.eggsReady=0;yoshi.runAway=false;

// Ground - 2 narrow gaps only (easy)
const gaps=[{s:2300,e:2400},{s:4800,e:4900}];
for(let x=0;x<LW;x+=TILE)if(!gaps.some(g=>x>=g.s&&x<g.e))platforms.push({x,y:H-TILE,w:TILE,h:TILE,type:'ground',bounceOffset:0});

// Zone 1 - tutorial
addRow(160,H-5*TILE,1,'q',true);addRow(288,H-5*TILE,2,'brick');
addRow(576,H-5*TILE,2,'brick');addRow(640,H-5*TILE,1,'q',true);addRow(800,H-5*TILE,3,'brick');
// Zone 2
addRow(1024,H-5*TILE,1,'q');addRow(1152,H-7*TILE,2,'brick');addRow(1280,H-5*TILE,1,'q',true);
addRow(1440,H-5*TILE,2,'brick');addRow(1600,H-5*TILE,2,'g');addRow(1700,H-7*TILE,2,'g');
// Zone 3
addRow(1900,H-5*TILE,2,'q');addRow(2050,H-5*TILE,3,'brick');addRow(2100,H-7*TILE,1,'q',true);
addStair(2150,3);
// Zone 4 (after gap 1)
addRow(2450,H-5*TILE,2,'q');addRow(2600,H-5*TILE,3,'brick');addRow(2750,H-7*TILE,2,'q',true);
addRow(2900,H-5*TILE,2,'brick');addRow(3100,H-5*TILE,1,'q');
addRow(3300,H-5*TILE,2,'g');addRow(3400,H-7*TILE,2,'g');addRow(3550,H-5*TILE,2,'g');
// Zone 5
addRow(3750,H-5*TILE,1,'q');addRow(3900,H-5*TILE,2,'brick');addRow(4050,H-7*TILE,2,'q',true);
addRow(4250,H-5*TILE,2,'brick');
// Zone 6 (after gap 2)
addRow(4950,H-5*TILE,2,'q');addRow(5100,H-5*TILE,3,'brick');addRow(5250,H-7*TILE,2,'q',true);
addRow(5450,H-5*TILE,2,'brick');addRow(5650,H-5*TILE,3,'brick');addRow(5800,H-7*TILE,2,'q');
// Zone 7 - final
addRow(6000,H-5*TILE,2,'q',true);addRow(6150,H-5*TILE,3,'brick');
addRow(6350,H-5*TILE,2,'brick');addRow(6500,H-7*TILE,2,'q');addStair(6700,8);

// Pipes
[[500,2,false],[1350,3,true],[3200,2,false],[5500,2,false],[7200,4,false]].forEach(([px,ph,warp])=>{
pipes.push({x:px,y:H-TILE-ph*TILE,w:TILE*2,h:ph*TILE,bounceOffset:0,isWarp:warp})});
pipes.forEach((p,i)=>{if(p.isWarp)return;piranhas.push({x:p.x+8,baseY:p.y,y:p.y,w:16,h:TILE,phase:i*1.5,alive:true,maxUp:TILE*1.5})});

// Coins
for(let i=0;i<50;i++)coinItems.push({x:150+i*148,y:H-8*TILE,collected:false});

// Enemies - goombas & few koopas only, well spaced
[{x:350,t:'goomba'},{x:550,t:'goomba'},{x:700,t:'goomba'},
{x:1050,t:'koopa'},{x:1250,t:'goomba'},{x:1480,t:'goomba'},
{x:1700,t:'goomba'},{x:1900,t:'goomba'},
{x:2050,t:'koopa'},{x:2500,t:'goomba'},{x:2700,t:'goomba'},
{x:2900,t:'goomba'},{x:3100,t:'koopa'},{x:3400,t:'goomba'},
{x:3650,t:'goomba'},{x:3900,t:'goomba'},{x:4200,t:'koopa'},
{x:4450,t:'goomba'},{x:5000,t:'goomba'},{x:5200,t:'goomba'},
{x:5450,t:'koopa'},{x:5700,t:'goomba'},
{x:5950,t:'goomba'},{x:6200,t:'goomba'},{x:6450,t:'koopa'},
{x:6700,t:'goomba'},{x:6900,t:'goomba'},
{x:280,t:'parakoopa'},{x:2800,t:'parakoopa'},{x:5300,t:'parakoopa'}
].forEach(({x,t})=>{
if(t==='parakoopa'){const by=H-5*TILE;enemies.push({x,y:by,w:TILE,h:TILE*1.2,vx:-1.5,vy:0,alive:true,type:'parakoopa',state:'walk',flying:true,baseY:by,phase:Math.random()*Math.PI*2,shellTimer:0,walkFrame:0,walkTimer:0})}
else enemies.push({x,y:H-2*TILE,w:TILE,h:t==='koopa'?TILE*1.2:TILE,vx:-1.5,vy:0,alive:true,type:t,state:'walk',shellTimer:0,walkFrame:0,walkTimer:0});
});

// Moving platforms (over gaps)
movingPlats.push(
{x:2330,y:H-5*TILE,w:TILE*3,h:12,type:'h',ox:2330,range:50,spd:1.5},
{x:4820,y:H-5*TILE,w:TILE*3,h:12,type:'h',ox:4820,range:50,spd:1.5});

// Springs
springs.push({x:850,y:H-TILE-24,w:24,h:24,compressed:0},{x:4100,y:H-TILE-24,w:24,h:24,compressed:0});

// Checkpoint
checkpoint={x:3600,y:H-TILE,reached:false};
// Star block
platforms.push({x:1280,y:H-5*TILE,w:TILE,h:TILE,type:'question',hit:false,hasStar:true,bounceOffset:0});
// 1UP hidden block
platforms.push({x:1900,y:H-9*TILE,w:TILE,h:TILE,type:'hidden',hit:false,has1UP:true,bounceOffset:0});
// Coin blocks
platforms.push({x:352,y:H-5*TILE,w:TILE,h:TILE,type:'question',hit:false,coinBlock:true,hitsLeft:10,bounceOffset:0});
platforms.push({x:3100,y:H-5*TILE,w:TILE,h:TILE,type:'question',hit:false,coinBlock:true,hitsLeft:8,bounceOffset:0});
// Yoshi egg (early)
platforms.push({x:224,y:H-5*TILE,w:TILE,h:TILE,type:'yoshiEgg',hit:false,bounceOffset:0});
}

function buildLevel2(){
[platforms,pipes,coinItems,enemies,mushrooms,fireballs,piranhas,particles,scorePopups,blockAnims,movingPlats,springs,cannons,bulletBills,yoshiEggs,yoshiItems].forEach(a=>a.length=0);
hammers.length=0;starTimer=0;combo=0;comboTimer=0;checkpointReached=false;checkpoint=null;goalSlide=null;ugMode=false;savedOW=null;
yoshi.alive=false;yoshi.mounted=false;yoshi.eatCount=0;yoshi.eggsReady=0;yoshi.runAway=false;

// Ground - 3 gaps (medium)
const gaps=[{s:1800,e:1900},{s:3300,e:3460},{s:4300,e:4420},{s:5050,e:5210},{s:6500,e:6660}];
for(let x=0;x<LW;x+=TILE)if(!gaps.some(g=>x>=g.s&&x<g.e))platforms.push({x,y:H-TILE,w:TILE,h:TILE,type:'ground',bounceOffset:0});

// Zone 1
addRow(128,H-5*TILE,1,'q');addRow(256,H-5*TILE,1,'q',true);addRow(416,H-5*TILE,1,'q');
addRow(512,H-9*TILE,2,'brick');addStair(640,4);
addRow(800,H-7*TILE,3,'brick');addRow(864,H-11*TILE,2,'q');
// Zone 2
addRow(1024,H-5*TILE,1,'q');addRow(1152,H-9*TILE,1,'q');
addRow(1280,H-5*TILE,2,'brick');
addRow(1440,H-3*TILE,3,'g');addRow(1600,H-5*TILE,3,'g');
addRow(1920,H-7*TILE,2,'q');addRow(2000,H-5*TILE,3,'brick');
// Zone 3
addRow(2200,H-5*TILE,1,'q');addRow(2300,H-9*TILE,2,'brick');
addRow(2500,H-5*TILE,3,'brick');addRow(2600,H-9*TILE,1,'q');
addRow(2800,H-3*TILE,3,'g');addRow(2900,H-5*TILE,3,'g');addRow(3000,H-7*TILE,3,'g');
addRow(3100,H-5*TILE,2,'q');
// Zone 4
addRow(3500,H-5*TILE,3,'brick');addRow(3700,H-9*TILE,2,'q',true);addStairD(3900,5);
// Zone 5
addRow(4100,H-5*TILE,4,'brick');addRow(4200,H-9*TILE,2,'q');
addRow(4500,H-9*TILE,3,'brick');addStair(4700,6);
// Zone 6
addRow(5300,H-7*TILE,2,'q');addRow(5500,H-4*TILE,3,'brick');
addRow(5600,H-8*TILE,2,'q');addRow(5700,H-5*TILE,2,'brick');
// Zone 7
addRow(5900,H-5*TILE,2,'q',true);addRow(6050,H-9*TILE,2,'brick');
addRow(6200,H-5*TILE,3,'brick');addRow(6300,H-9*TILE,2,'q');
addStair(6700,8);addRow(7000,H-5*TILE,2,'q');

// Pipes
[[700,2,false],[1400,3,true],[2200,2,false],[4050,3,true],[5700,2,false],[6300,2,false],[7200,4,false]].forEach(([px,ph,warp])=>{
pipes.push({x:px,y:H-TILE-ph*TILE,w:TILE*2,h:ph*TILE,bounceOffset:0,isWarp:warp})});
// Piranhas
pipes.forEach((p,i)=>{if(p.isWarp)return;piranhas.push({x:p.x+8,baseY:p.y,y:p.y,w:16,h:TILE,phase:i*1.5,alive:true,maxUp:TILE*1.5})});
// Coins
for(let i=0;i<50;i++)coinItems.push({x:200+i*140,y:H-10*TILE,collected:false});
// Enemies
[{x:300,t:'goomba'},{x:380,t:'goomba'},{x:420,t:'goomba'},{x:480,t:'koopa'},
{x:550,t:'goomba'},{x:600,t:'buzzy'},{x:680,t:'koopa'},{x:780,t:'goomba'},{x:820,t:'goomba'},
{x:950,t:'hammerBro'},{x:1050,t:'goomba'},{x:1100,t:'buzzy'},{x:1150,t:'koopa'},{x:1200,t:'goomba'},
{x:1300,t:'koopa'},{x:1350,t:'goomba'},{x:1450,t:'koopa'},{x:1500,t:'buzzy'},{x:1560,t:'goomba'},
{x:1650,t:'koopa'},{x:1750,t:'goomba'},{x:1700,t:'buzzy'},{x:1950,t:'hammerBro'},
{x:2050,t:'goomba'},{x:2100,t:'buzzy'},{x:2150,t:'koopa'},{x:2250,t:'goomba'},{x:2350,t:'koopa'},
{x:2450,t:'buzzy'},{x:2550,t:'goomba'},{x:2650,t:'koopa'},{x:2750,t:'goomba'},{x:2800,t:'buzzy'},
{x:2900,t:'koopa'},{x:3000,t:'goomba'},{x:3050,t:'goomba'},{x:3100,t:'buzzy'},
{x:3200,t:'hammerBro'},{x:3500,t:'goomba'},{x:3550,t:'koopa'},
{x:3600,t:'goomba'},{x:3700,t:'koopa'},{x:3800,t:'buzzy'},
{x:3900,t:'goomba'},{x:3950,t:'goomba'},{x:4000,t:'koopa'},
{x:4100,t:'buzzy'},{x:4150,t:'goomba'},{x:4250,t:'goomba'},
{x:4500,t:'hammerBro'},{x:4600,t:'koopa'},{x:4650,t:'goomba'},{x:4750,t:'buzzy'},{x:4800,t:'koopa'},
{x:4900,t:'goomba'},{x:4950,t:'goomba'},{x:5300,t:'buzzy'},{x:5350,t:'koopa'},{x:5400,t:'goomba'},

// === HELPERS ===
function overlap(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by}
function cX(obj,p){const bo=p.bounceOffset||0;if(!overlap(obj.x,obj.y+2,obj.w,obj.h-4,p.x,p.y-bo,p.w,p.h))return;if(obj.x+obj.w/2<p.x+p.w/2)obj.x=p.x-obj.w;else obj.x=p.x+p.w;obj.vx=obj===mario?0:-obj.vx}
function cY(obj,p,onHit){const bo=p.bounceOffset||0,py=p.y-bo;if(!overlap(obj.x+1,obj.y,obj.w-2,obj.h,p.x,py,p.w,p.h))return;if(obj.y+obj.h/2<py+p.h/2){obj.y=py-obj.h;obj.vy=0;obj.onGround=true}else{obj.y=py+p.h;obj.vy=0;if(onHit)onHit(p)}}
function spawnParticle(x,y,type){const count=type==='brick'?8:type==='star'?6:4;for(let i=0;i<count;i++){const angle=(Math.PI*2/count)*i+Math.random()*0.5;const spd=(type==='brick'?4:type==='star'?5:2)+Math.random()*2;particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-2,life:1,decay:0.025+Math.random()*0.02,size:type==='brick'?5+Math.random()*4:type==='star'?4+Math.random()*3:3+Math.random()*3,color:type==='brick'?`hsl(${10+Math.random()*20},80%,45%)`:type==='star'?`hsl(${45+Math.random()*30},100%,65%)`:type==='dust'?`hsl(30,30%,${60+Math.random()*30}%)`:'#fff',type})}}
function spawnScorePopup(x,y,val,color='#fff'){scorePopups.push({x,y,val,vy:-1.8,life:1,color})}
function updateParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=p.decay;if(p.life<=0)particles.splice(i,1)}for(let i=scorePopups.length-1;i>=0;i--){const p=scorePopups[i];p.y+=p.vy;p.vy*=0.95;p.life-=0.02;if(p.life<=0)scorePopups.splice(i,1)}}

e.preventDefault()});

else{mario.vy=isDash?-15.5:-14}

}

function checkPipeEntry(){

for(const p of pipes){if(!p.isWarp||p.used)continue;const onTop=mario.y+mario.h>=p.y-2&&mario.y+mario.h<=p.y+4;const above=mario.x+mario.w>p.x&&mario.x<p.x+p.w;if(onTop&&above){p.used=true;enterUnderground(p);return}}
}

if(e.type==='parakoopa'&&e.flying){e.x+=e.vx;if(e.x+e.w<-100){e.alive=false;continue}e.y=e.baseY+Math.sin(frame*0.05+(e.phase||0))*22;if(mario.inv===0&&overlap(mario.x,mario.y,mario.w,mario.h,e.x,e.y,e.w,e.h)){if(starTimer>0){e.alive=false;score+=200;sfx('stomp');updateHUD();spawnParticle(e.x+16,e.y,'star');spawnScorePopup(e.x+8,e.y-8,200,'#FFD700');continue}if(mario.y+mario.h-mario.vy<=e.y+8){e.flying=false;e.type='koopa';e.state='shell';e.vx=0;e.h=TILE*0.7;e.shellTimer=300;mario.vy=-9;sfx('stomp');combo++;comboTimer=60;score+=200;updateHUD();spawnParticle(e.x+16,e.y,'dust');spawnScorePopup(e.x+8,e.y-8,200,'#e74c3c')}else killMario()}continue}
e.x+=e.vx;for(const p of[...platforms,...pipes]){if(Math.abs((p.x+p.w/2)-e.x)>220)continue;cX(e,p)}
e.vy+=GRAVITY;e.y+=e.vy;e.onGround=false;for(const p of[...platforms,...pipes]){if(Math.abs((p.x+p.w/2)-e.x)>220)continue;cY(e,p,null)}
if(e.y>H+100){e.alive=false;continue}
if(e.onGround&&e.state==='walk'){e.walkTimer++;if(e.walkTimer>8){e.walkTimer=0;e.walkFrame=(e.walkFrame+1)%2}}
if(e.state==='shell'&&Math.abs(e.vx)>1){for(const o of enemies){if(o===e||!o.alive||o.state==='dead')continue;if(overlap(e.x,e.y,e.w,e.h,o.x,o.y,o.w,o.h)){o.state='dead';o.squishT=20;score+=200;sfx('stomp');updateHUD();spawnScorePopup(o.x+8,o.y-8,200,'#e74c3c')}}}
if(mario.inv===0&&overlap(mario.x,mario.y,mario.w,mario.h,e.x,e.y,e.w,e.h)){
if(starTimer>0){e.state='dead';e.squishT=20;score+=200;sfx('stomp');updateHUD();spawnParticle(e.x+16,e.y+16,'star');spawnScorePopup(e.x+8,e.y-8,200,'#FFD700');continue}
const mBot=mario.y+mario.h;if(mBot-mario.vy<=e.y+6){combo++;comboTimer=60;const cs=combo<=1?200:combo===2?400:combo===3?800:combo===4?1600:0;if(combo>=5){lives++;sfx('1up');spawnScorePopup(e.x+8,e.y-8,'1UP!','#2ecc71')}else{score+=cs;spawnScorePopup(e.x+8,e.y-8,cs,'#e74c3c')}
mario.vy=-9;sfx('stomp');updateHUD();spawnParticle(e.x+16,e.y+16,'dust');
if(e.type==='goomba'||e.type==='hammerBro'){e.state='dead';e.squishT=28}
else if(e.type==='koopa'||e.type==='buzzy'){if(e.state==='walk'){e.state='shell';e.vx=0;e.h=TILE*0.7;e.shellTimer=300}else if(e.state==='shell'&&Math.abs(e.vx)<0.5)e.vx=mario.facing*8;else{e.vx=0;e.shellTimer=300}}}
else if(e.state==='shell'&&Math.abs(e.vx)<0.5){e.vx=mario.facing*8;sfx('stomp');mario.inv=10}else killMario()}
if(e.state==='shell'){e.shellTimer--;if(e.shellTimer<=0){e.state='walk';e.vx=e.type==='buzzy'?-1.6:-1.3;e.h=e.type==='koopa'?TILE*1.2:e.type==='buzzy'?TILE*0.85:TILE}}}
// Piranhas
for(const pr of piranhas){if(!pr.alive)continue;const t=frame*0.03+pr.phase;pr.y=pr.baseY-Math.max(0,Math.sin(t))*pr.maxUp;
if(mario.inv===0&&overlap(mario.x,mario.y,mario.w,mario.h,pr.x,pr.y,pr.w,pr.h))killMario();
for(const fb of fireballs){if(!fb.alive)continue;if(overlap(fb.x,fb.y,fb.w,fb.h,pr.x,pr.y,pr.w,pr.h)){pr.alive=false;fb.alive=false;score+=200;sfx('stomp');updateHUD();spawnParticle(pr.x+8,pr.y,'star');spawnScorePopup(pr.x+8,pr.y-8,200,'#27ae60')}}}
if(ugMode&&mario.x>W-1.5*TILE&&mario.onGround)exitUnderground();
if(checkpoint&&!checkpointReached&&mario.x>checkpoint.x){checkpointReached=true;sfx('flag');spawnScorePopup(checkpoint.x,checkpoint.y-TILE*3,'CHECK!','#2ecc71');for(let i=0;i<10;i++)spawnParticle(checkpoint.x+8,checkpoint.y-TILE*2,'star')}
if(!ugMode&&!mario.dead&&mario.x+mario.w>=flagPole.x&&mario.x<=flagPole.x+20){sfx('flag');stopBGM();goalSlide={phase:'slide',t:0};mario.vx=0;mario.vy=0}
// Fireballs
for(let i=fireballs.length-1;i>=0;i--){const fb=fireballs[i];if(!fb.alive){fireballs.splice(i,1);continue}
fb.vy+=0.55;fb.x+=fb.vx;fb.y+=fb.vy;
for(const p of[...platforms,...pipes]){const bo=p.bounceOffset||0,py=p.y-bo;if(!overlap(fb.x,fb.y,fb.w,fb.h,p.x,py,p.w,p.h))continue;if(fb.y+fb.h/2<py+p.h/2){fb.y=py-fb.h;fb.vy=-8;fb.bounces++}else fb.alive=false;break}
if(fb.bounces>4||fb.x<cam-80||fb.x>cam+W+80||fb.y>H+50)fb.alive=false;
for(const e of enemies){if(!e.alive||e.state==='dead')continue;if(!overlap(fb.x,fb.y,fb.w,fb.h,e.x,e.y,e.w,e.h))continue;
if(e.type==='buzzy'){fb.alive=false;spawnParticle(e.x+16,e.y+16,'dust');continue}
e.state='dead';e.vx=0;e.squishT=28;fb.alive=false;score+=200;sfx('stomp');updateHUD();spawnScorePopup(e.x+8,e.y-8,200,'#ff9944');spawnParticle(e.x+16,e.y+16,'star')}}
}else{mario.vy+=GRAVITY;mario.y+=mario.vy}
updateParticles();
}

for(const pr of piranhas)if(pr.alive)drawPiranha(pr);

for(const cn of cannons){if(cn.x+cn.w<cam-10||cn.x>cam+W+10)continue;ctx.fillStyle='#1a1a1a';ctx.fillRect(cn.x,cn.y,cn.w,cn.h);ctx.fillStyle='#333';ctx.fillRect(cn.x+2,cn.y+2,cn.w-4,cn.h-4);ctx.fillStyle='#888';ctx.beginPath();ctx.arc(cn.x+cn.w/2,cn.y+14,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#333';ctx.fillRect(cn.x+cn.w/2-4,cn.y+10,3,3);ctx.fillRect(cn.x+cn.w/2+1,cn.y+10,3,3);if(cn.timer<10){ctx.fillStyle=`rgba(255,${150+Math.random()*100},0,${0.5+Math.random()*0.5})`;ctx.beginPath();ctx.arc(cn.x+cn.w/2,cn.y-4,8+Math.random()*4,0,Math.PI*2);ctx.fill()}}
// Bullet Bills
for(const bb of bulletBills){if(!bb.alive)continue;const dir=bb.vx>0?1:-1;ctx.fillStyle='#111';ctx.fillRect(bb.x,bb.y,bb.w,bb.h);ctx.fillStyle='#333';ctx.fillRect(bb.x+(dir>0?2:4),bb.y+2,bb.w-6,bb.h-4);ctx.fillStyle='#111';ctx.fillRect(dir>0?bb.x+bb.w-2:bb.x,bb.y+2,4,bb.h-4);ctx.fillStyle='#fff';ctx.fillRect(bb.x+(dir>0?4:bb.w-8),bb.y+4,4,4);ctx.fillStyle='#000';ctx.fillRect(bb.x+(dir>0?5:bb.w-7),bb.y+5,2,2);ctx.fillStyle=`rgba(255,${100+Math.random()*100},0,0.7)`;ctx.fillRect(dir>0?bb.x-6:bb.x+bb.w+2,bb.y+4,6,bb.h-8)}
// Hammers
for(const h of hammers){ctx.save();ctx.translate(h.x+7,h.y+7);ctx.rotate(h.rot);ctx.fillStyle='#8B4513';ctx.fillRect(-2,0,4,10);ctx.fillStyle='#888';ctx.fillRect(-6,-6,12,8);ctx.restore()}
// Mushrooms, stars, flowers
for(const m of mushrooms)if(m.alive)drawMushroom(m);
for(const fb of fireballs)if(fb.alive)drawFireball(fb);
// Yoshi items (eggs hatching)
for(const yi of yoshiItems)drawYoshiEggItem(yi);
// Yoshi egg projectiles
for(const eg of yoshiEggs)if(eg.alive)drawYoshiEggProj(eg);
// Coins
for(const c of coinItems){if(c.collected)continue;if(c.pop){drawCoinItem(c.x,c.popY);continue}if(c.x+TILE<cam||c.x>cam+W)continue;drawCoinItem(c.x,c.y)}
// Enemies
for(const e of enemies){if(!e.alive||e.x+e.w<cam-10||e.x>cam+W+10)continue;
if(e.type==='koopa'||e.type==='parakoopa')drawKoopa(e);else if(e.type==='buzzy')drawBuzzy(e);else if(e.type==='hammerBro')drawHammerBro(e);
else drawGoomba(e.x,e.y,e.state==='dead',e.walkFrame)}
if(!ugMode&&flagPole.x-cam>-200&&flagPole.x-cam<W+200)drawFlag();
// Star aura
if(starTimer>0){const hue=(frame*12)%360;ctx.fillStyle=`hsla(${hue},100%,60%,0.3)`;ctx.beginPath();ctx.arc(mario.x+13,mario.y+mario.h/2,22,0,Math.PI*2);ctx.fill()}
// Yoshi (behind Mario if mounted)
if(yoshi.alive){if(yoshi.mounted)drawYoshi(yoshi.x,yoshi.y,yoshi.facing,true);else drawYoshi(yoshi.x,yoshi.y,yoshi.facing,false)}
// Mario
drawMario(mario.x,yoshi.mounted&&yoshi.alive?mario.y-12:mario.y,mario.facing,mario.walkFrame,mario.dead,mario.big);
drawParticles();ctx.restore();drawScorePopups();
// Combo HUD
if(combo>1&&comboTimer>0){ctx.fillStyle=`rgba(255,100,50,${Math.min(1,comboTimer/20)})`;ctx.font='bold 16px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillText(`x${combo} COMBO!`,W/2,60);ctx.textAlign='left'}
// Yoshi egg count HUD
if(yoshi.alive&&yoshi.mounted&&yoshi.eatCount>0){ctx.fillStyle='#4CAF50';ctx.font='10px "Press Start 2P",monospace';ctx.fillText(`EAT:${yoshi.eatCount}/5`,10,H-10)}
ctx.restore();
if(state==='start')drawOverlay('SUPER MARIO','CLICK or SPACE to START','#1a1a5e');
if(state==='dead')drawOverlay('MISS!',`${lives} LEFT\nCLICK or SPACE to CONTINUE`,'#4a1a1a');
if(state==='over')drawOverlay('GAME OVER','CLICK or SPACE to RESTART','#2d0000');
if(state==='win')drawOverlay('COURSE CLEAR!',`SCORE: ${score}\nCLICK or SPACE`,'#0a3a0a');
}

(function loop(){update();draw();requestAnimationFrame(loop)})();
</script>
</body>
</html>
