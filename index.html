            // Coin blocks
            platforms.push({ x: 800, y: H - 5 * TILE, w: TILE, h: TILE, type: 'question', hit: false, coinBlock: true, hitsLeft: 8, bounceOffset: 0 });
            platforms.push({ x: 4400, y: H - 9 * TILE, w: TILE, h: TILE, type: 'question', hit: false, coinBlock: true, hitsLeft: 6, bounceOffset: 0 });
        }

        function buildUnderground() {
            // Called when entering warp pipe - populates platforms/coinItems/enemies
            for (let x = 0; x < W; x += TILE) {
                platforms.push({ x, y: H - TILE, w: TILE, h: TILE, type: 'ground', bounceOffset: 0 });
                if (x > 0 && x < W - TILE) platforms.push({ x, y: 0, w: TILE, h: TILE, type: 'ground', bounceOffset: 0 });
            }
            // Blocks
            addRow(100, H - 4 * TILE, 3, 'brick'); addRow(180, H - 7 * TILE, 3, 'q', true);
            addRow(350, H - 4 * TILE, 4, 'brick'); addRow(430, H - 8 * TILE, 2, 'q', true);
            addRow(550, H - 5 * TILE, 5, 'brick');
            addRow(650, H - 9 * TILE, 3, 'q', true);
            // Lots of coins
            for (let i = 0; i < 18; i++) coinItems.push({ x: 80 + i * 38, y: H - 6 * TILE, collected: false });
            for (let i = 0; i < 12; i++) coinItems.push({ x: 130 + i * 50, y: H - 9 * TILE, collected: false });
            // A couple of Goombas
            [{ x: 250 }, { x: 500 }].forEach(({ x }) => {
                enemies.push({ x, y: H - 2 * TILE, w: TILE, h: TILE, vx: -1.3, vy: 0, alive: true, type: 'goomba', state: 'walk', shellTimer: 0, walkFrame: 0, walkTimer: 0 });
            });
            // Exit pipe on the right side of underground
            pipes.push({ x: W - 3 * TILE, y: H - TILE - 3 * TILE, w: TILE * 2, h: 3 * TILE, bounceOffset: 0, isWarp: false, isExit: true });
        }

        // ═══════════════════════════════════════════════════════════════
        // MARIO
        // ═══════════════════════════════════════════════════════════════
        const mario = { x: 80, y: H - 3 * TILE, w: 26, h: 32, vx: 0, vy: 0, onGround: false, facing: 1, walkFrame: 0, walkTimer: 0, inv: 0, dead: false, big: false, power: 'none' };

        function resetMario() {
            const bh = mario.power !== 'none' ? 48 : 32;
            Object.assign(mario, { x: 80, y: H - 3 * TILE, w: 26, h: bh, vx: 0, vy: 0, onGround: false, facing: 1, walkFrame: 0, walkTimer: 0, inv: 0, dead: false });
            cam = 0;
        }

        function upgradeMario(type) {
            if (type === 'flower') { mario.power = 'fire'; }
            else { mario.power = 'big'; }
            if (!mario.big) { mario.h = 48; mario.y -= 16; }
            mario.big = true;
            sfx('power');
            for (let i = 0; i < 20; i++) spawnParticle(mario.x + 13, mario.y + 24, 'star');
        }

        // ═══════════════════════════════════════════════════════════════
        // INPUT
        // ═══════════════════════════════════════════════════════════════
        const keys = {}, btn = { left: false, right: false, jump: false, dash: false, down: false };

        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (state === 'start' && (e.code === 'Space' || e.code === 'Enter')) startGame();
            if ((state === 'dead' || state === 'over' || state === 'win') && (e.code === 'Space' || e.code === 'Enter')) {
                if (state === 'over' || state === 'win') { score = 0; coins = 0; lives = 3; mario.big = false; mario.power = 'none'; }
                startGame();
            }
            if (state === 'play' && (e.code === 'Space' || e.code === 'ArrowUp') && mario.onGround && !mario.dead) doJump();
            if (state === 'play' && e.code === 'KeyZ' && mario.power === 'fire' && !mario.dead) shootFireball();
            if (state === 'play' && e.code === 'ArrowDown' && mario.onGround && !mario.dead) checkPipeEntry();
            e.preventDefault();
        });
        document.addEventListener('keyup', e => { keys[e.code] = false; });

        function doJump() {
            const isDash = keys['ShiftLeft'] || keys['ShiftRight'] || btn.dash;
            mario.vy = isDash ? -15.5 : -14;
            mario.onGround = false; sfx('jump');
            for (let i = 0; i < 6; i++) spawnParticle(mario.x + 13, mario.y + mario.h, isDash ? 'star' : 'dust');
        }
        function checkPipeEntry() {
            if (ugMode) {
                // In underground: check if on top of exit pipe
                for (const p of pipes) {
                    if (!p.isExit) continue;
                    const onTop = mario.y + mario.h >= p.y - 2 && mario.y + mario.h <= p.y + 4;
                    const above = mario.x + mario.w > p.x && mario.x < p.x + p.w;
                    if (onTop && above) { exitUnderground(); return; }
                }
                return;
            }
            for (const p of pipes) {
                if (!p.isWarp || p.used) continue;
                const onTop = mario.y + mario.h >= p.y - 2 && mario.y + mario.h <= p.y + 4;
                const above = mario.x + mario.w > p.x && mario.x < p.x + p.w;
                if (onTop && above) { p.used = true; enterUnderground(p); return; }
            }
        }
        function enterUnderground(p) {
            savedOW = {
                platforms: [...platforms], pipes: [...pipes], coinItems: [...coinItems],
                enemies: [...enemies], mushrooms: [...mushrooms], piranhas: [...piranhas],
                cam, mx: mario.x, my: mario.y
            };
            platforms.length = 0; pipes.length = 0; coinItems.length = 0;
            enemies.length = 0; mushrooms.length = 0; piranhas.length = 0;
            buildUnderground();
            cam = 0; mario.x = 60; mario.y = H - 3 * TILE; mario.vx = 0; mario.vy = 0;
            ugMode = true;
            score += 500; sfx('flag');
            stopBGM(); try { startBGM(); } catch (ex) { }
        }
        function exitUnderground() {
            if (!savedOW) return;
            platforms.length = 0; platforms.push(...savedOW.platforms);
            pipes.length = 0; pipes.push(...savedOW.pipes);
            coinItems.length = 0; coinItems.push(...savedOW.coinItems);
            enemies.length = 0; enemies.push(...savedOW.enemies);
            mushrooms.length = 0; mushrooms.push(...savedOW.mushrooms);
            piranhas.length = 0; piranhas.push(...savedOW.piranhas);
            cam = savedOW.cam; mario.x = savedOW.mx; mario.y = savedOW.my - TILE * 2;
            mario.vy = -10; ugMode = false; savedOW = null;
            score += 1000; updateHUD(); sfx('flag');
            stopBGM(); try { startBGM(); } catch (ex) { }
        }

        function setupBtn(id, key) {
            const el = document.getElementById(id);
            const press = e => {
                e.preventDefault(); btn[key] = true; el.classList.add('pressed');
                if (key === 'jump') {
                    if (state === 'play' && mario.onGround && !mario.dead) doJump();
                    if (state === 'start') startGame();
                    if (state === 'dead' || state === 'over' || state === 'win') {
                        if (state === 'over' || state === 'win') { score = 0; coins = 0; lives = 3; mario.big = false; }
                        startGame();
                    }
                } else {
                    if (state === 'start') startGame();
                }
            };
            const release = e => { e.preventDefault(); btn[key] = false; el.classList.remove('pressed'); };
            el.addEventListener('mousedown', press); el.addEventListener('touchstart', press, { passive: false });
            el.addEventListener('mouseup', release); el.addEventListener('touchend', release); el.addEventListener('mouseleave', release);
        }
        setupBtn('btn-left', 'left'); setupBtn('btn-right', 'right'); setupBtn('btn-jump', 'jump');
        setupBtn('btn-dash', 'dash'); setupBtn('btn-down', 'down');
        // fire button
        (function () {
            const el = document.getElementById('btn-fire');
            if (!el) return;
            const press = e => { e.preventDefault(); if (state === 'play' && mario.power === 'fire' && !mario.dead) shootFireball(); el.classList.add('pressed'); setTimeout(() => el.classList.remove('pressed'), 150); };
            el.addEventListener('mousedown', press); el.addEventListener('touchstart', press, { passive: false });
        })();
        // down button for pipe
        document.getElementById('btn-down').addEventListener('mousedown', e => { e.preventDefault(); if (state === 'play' && mario.onGround && !mario.dead) checkPipeEntry(); });
        document.getElementById('btn-down').addEventListener('touchstart', e => { e.preventDefault(); if (state === 'play' && mario.onGround && !mario.dead) checkPipeEntry(); }, { passive: false });
        canvas.addEventListener('click', () => { if (state !== 'play') { if (state === 'over' || state === 'win') { score = 0; coins = 0; lives = 3; mario.big = false; mario.power = 'none'; } startGame(); } });

        // ═══════════════════════════════════════════════════════════════
        // PARTICLES
        // ═══════════════════════════════════════════════════════════════
        function spawnParticle(x, y, type) {
            const count = type === 'brick' ? 8 : type === 'star' ? 6 : 4;
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                const spd = (type === 'brick' ? 4 : type === 'star' ? 5 : 2) + Math.random() * 2;
                particles.push({
                    x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 2,
                    life: 1, decay: 0.025 + Math.random() * 0.02,
                    size: type === 'brick' ? 5 + Math.random() * 4 : type === 'star' ? 4 + Math.random() * 3 : 3 + Math.random() * 3,
                    color: type === 'brick' ? `hsl(${10 + Math.random() * 20},80%,45%)` : type === 'star' ? `hsl(${45 + Math.random() * 30},100%,65%)` : type === 'dust' ? `hsl(30,30%,${60 + Math.random() * 30}%)` : type === 'coin' ? `hsl(50,100%,60%)` : '#fff',
                    type
                });
            }
        }

        function spawnScorePopup(x, y, val, color = '#fff') {
            scorePopups.push({ x, y, val, vy: -1.8, life: 1, color });
        }

        // ═══════════════════════════════════════════════════════════════
        // GAME STATE MANAGEMENT
        // ═══════════════════════════════════════════════════════════════
        function startGame() {
            buildLevel();
            mario.big = false; mario.power = 'none';
            fireballs.length = 0;
            resetMario();
            timeLeft = 400;
            state = 'intro'; introTimer = 120; // Show WORLD X-X screen first
            if (timerTick) clearInterval(timerTick);
            updateHUD();
            try { AC.resume(); } catch (e) { }
        }

        function killMario() {
            if (starTimer > 0 || mario.inv > 0) return;
            if (mario.power === 'fire') { mario.power = 'big'; mario.inv = 120; sfx('break'); return; }
            if (mario.power === 'big') { mario.power = 'none'; mario.big = false; mario.h = 32; mario.inv = 120; sfx('break'); return; }
            lives--; combo = 0;
            sfx('die'); stopBGM();
            mario.dead = true; mario.vy = -11;
            shakeX = 8; shakeY = 8;
            updateHUD();
            setTimeout(() => {
                if (lives <= 0) { state = 'over'; clearInterval(timerTick); }
                else {
                    if (checkpointReached && checkpoint) {
                        // Respawn at checkpoint
                        resetMario();
                        mario.x = checkpoint.x; mario.y = checkpoint.y - mario.h;
                        cam = Math.max(0, Math.min(mario.x - W / 3, LW - W));
                        state = 'play';
                        timerTick = setInterval(() => { if (state === 'play') { timeLeft--; if (timeLeft <= 0) killMario(); updateHUD(); } }, 1000);
                        try { startBGM(); } catch (ex) { }
                    } else {
                        state = 'dead'; clearInterval(timerTick);
                    }
                }
            }, 2200);
        }

        function updateHUD() {
            document.getElementById('hScore').textContent = String(score).padStart(6, '0');
            document.getElementById('hCoins').textContent = '×' + String(coins).padStart(2, '0');
            document.getElementById('hTime').textContent = timeLeft;
            document.getElementById('hWorld').textContent = currentWorld + '-' + currentLevel;
            const li = document.getElementById('lives-icons');
            li.innerHTML = ''; for (let i = 0; i < Math.max(0, lives); i++) { const s = document.createElement('span'); s.textContent = '🍄'; s.style.fontSize = '14px'; li.appendChild(s); }
        }

        // ═══════════════════════════════════════════════════════════════
        // COLLISION
        // ═══════════════════════════════════════════════════════════════
        function overlap(ax, ay, aw, ah, bx, by, bw, bh) { return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by; }

        // Separate-axis collision helpers (prevents warp bug)
        function cX(obj, p) { // horizontal push
            const bo = p.bounceOffset || 0;
            if (!overlap(obj.x, obj.y + 2, obj.w, obj.h - 4, p.x, p.y - bo, p.w, p.h)) return;
            if (obj.x + obj.w / 2 < p.x + p.w / 2) obj.x = p.x - obj.w;
            else obj.x = p.x + p.w;
            obj.vx = obj === mario ? 0 : -obj.vx;
        }
        function cY(obj, p, onHit) { // vertical push
            const bo = p.bounceOffset || 0, py = p.y - bo;
            if (!overlap(obj.x + 1, obj.y, obj.w - 2, obj.h, p.x, py, p.w, p.h)) return;
            if (obj.y + obj.h / 2 < py + p.h / 2) { obj.y = py - obj.h; obj.vy = 0; obj.onGround = true; }
            else { obj.y = py + p.h; obj.vy = 0; if (onHit) onHit(p); }
        }
        function shootFireball() {
            if (frame - lastFireFrame < 18 || fireballs.length >= 2) return;
            lastFireFrame = frame;
            fireballs.push({ x: mario.x + (mario.facing === 1 ? mario.w - 4 : 0), y: mario.y + mario.h / 2 - 6, w: 12, h: 12, vx: mario.facing * 9, vy: -3, bounces: 0, alive: true });
            try { beep(880, 0.04, 'square', 0.12); beep(1100, 0.06, 'square', 0.1, 0.04); } catch (e) { }
        }

        function hitBlock(p) {
            if (p.type === 'hidden' && !p.hit) {
                // Hidden block - revealed on hit from below
                p.hit = true; p.type = 'question'; sfx('qblock');
                blockAnims.push({ p, t: 0 });
                if (p.has1UP) {
                    mushrooms.push({ x: p.x + 4, y: p.y - TILE, w: 24, h: TILE, vx: 1.5, vy: 0, alive: true, type: '1up' });
                    sfx('1up');
                }
            } else if (p.type === 'question' && !p.hit) {
                if (p.coinBlock && p.hitsLeft > 0) {
                    // Multi-hit coin block
                    p.hitsLeft--;
                    if (p.hitsLeft <= 0) p.hit = true;
                    sfx('coin'); blockAnims.push({ p, t: 0 });
                    spawnParticle(p.x + 16, p.y, 'coin');
                    spawnScorePopup(p.x + 16, p.y - 8, 200, '#FFD700');
                    score += 200; coins++; updateHUD();
                } else if (p.hasStar) {
                    p.hit = true; sfx('power');
                    blockAnims.push({ p, t: 0 });
                    mushrooms.push({ x: p.x + 4, y: p.y - TILE, w: 24, h: 24, alive: true, type: 'star' });
                } else {
                    p.hit = true; sfx('qblock');
                    blockAnims.push({ p, t: 0 });
                    if (p.hasMush) {
                        if (mario.power === 'none') {
                            mushrooms.push({ x: p.x + 4, y: p.y - TILE, w: 24, h: TILE, vx: 1.5, vy: 0, alive: true, type: 'mushroom' });
                        } else {
                            mushrooms.push({ x: p.x + 4, y: p.y - TILE, w: 24, h: 24, alive: true, type: 'flower' });
                        }
                    } else {
                        spawnParticle(p.x + 16, p.y, 'coin');
                        spawnScorePopup(p.x + 16, p.y - 8, 200, '#FFD700');
                        score += 200; coins++;
                        sfx('coin'); updateHUD();
                    }
                }
            } else if (p.type === 'brick') {
                if (mario.big) {
                    sfx('break'); score += 50; updateHUD();
                    spawnParticle(p.x + 16, p.y, 'brick');
                    spawnScorePopup(p.x + 16, p.y - 8, 50, '#e67e22');
                    const idx = platforms.indexOf(p); if (idx !== -1) platforms.splice(idx, 1);
                } else {
                    blockAnims.push({ p, t: 0 });
                }
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // UPDATE LOOP
        // ═══════════════════════════════════════════════════════════════
        function update() {
            frame++;
            if (bgmGain) { try { scheduleBGM(); } catch (e) { bgmGain = null; } }
            // Screen shake decay
            shakeX *= 0.8; shakeY *= 0.8; if (Math.abs(shakeX) < 0.1) shakeX = 0; if (Math.abs(shakeY) < 0.1) shakeY = 0;

            // Block bounce animations
            for (let i = blockAnims.length - 1; i >= 0; i--) {
                const b = blockAnims[i]; b.t += 0.2;
                b.p.bounceOffset = Math.sin(b.t) * 8 * Math.max(0, 1 - b.t / Math.PI);
                if (b.t > Math.PI) { b.p.bounceOffset = 0; blockAnims.splice(i, 1); }
            }

            // World intro screen countdown
            if (state === 'intro') {
                introTimer--;
                updateParticles();
                if (introTimer <= 0) {
                    state = 'play';
                    timerTick = setInterval(() => { if (state === 'play') { timeLeft--; if (timeLeft <= 0) killMario(); updateHUD(); } }, 1000);
                    try { startBGM(); } catch (e2) { }
                }
                return;
            }

            // Goal slide animation
            if (goalSlide) {
                goalSlide.t++;
                if (goalSlide.phase === 'slide') {
                    mario.y += 3;
                    mario.x = flagPole.x - 4;
                    if (mario.y >= H - TILE - mario.h) {
                        mario.y = H - TILE - mario.h;
                        goalSlide.phase = 'walk';
                    }
                } else if (goalSlide.phase === 'walk') {
                    mario.x += 2; mario.facing = 1;
                    mario.walkTimer++; if (mario.walkTimer > 5) { mario.walkTimer = 0; mario.walkFrame = (mario.walkFrame + 1) % 3; }
                    if (goalSlide.t > 120) {
                        goalSlide = null;
                        score += 1000 + timeLeft * 50; clearInterval(timerTick); state = 'win'; updateHUD();
                        for (let i = 0; i < 30; i++) setTimeout(() => spawnParticle(flagPole.x, H - TILE - 150 + Math.random() * 100, 'star'), i * 60);
                    }
                }
                updateParticles();
                return;
            }

            // Moving platforms update
            for (const mp of movingPlats) {
                if (mp.type === 'h') {
                    mp.x = mp.ox + Math.sin(frame * 0.015 * mp.spd) * mp.range;
                } else if (mp.type === 'v') {
                    mp.y = mp.oy + Math.sin(frame * 0.015 * mp.spd) * mp.range;
                } else if (mp.type === 'fall') {
                    if (mp.falling) {
                        mp.vy += 0.3;
                        mp.y += mp.vy;
                        if (mp.y > H + 100) { mp.y = mp.oy; mp.vy = 0; mp.falling = false; mp.fallTimer = 0; }
                    }
                }
            }

            // Star power timer
            if (starTimer > 0) {
                starTimer--;
                if (frame % 3 === 0) spawnParticle(mario.x + 13, mario.y + mario.h / 2, 'star');
                if (starTimer <= 0) mario.inv = 0;
            }

            // Combo timer decay
            if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) combo = 0; }

            // Bullet Bill Cannons - fire bullets toward Mario
            for (const cn of cannons) {
                cn.timer--;
                if (cn.timer <= 0) {
                    cn.timer = cn.fireRate;
                    // Only fire if Mario is somewhat close
                    if (Math.abs(mario.x - cn.x) < 600) {
                        const dir = mario.x > cn.x ? 1 : -1;
                        bulletBills.push({ x: cn.x + (dir > 0 ? cn.w : -20), y: cn.y + 4, w: 20, h: 16, vx: dir * 4, alive: true });
                        try { beep(80, 0.15, 'sawtooth', 0.15); beep(60, 0.2, 'sawtooth', 0.1, 0.1); } catch (ex) { }
                    }
                }
            }

            // Bullet Bill physics & collision
            for (let i = bulletBills.length - 1; i >= 0; i--) {
                const bb = bulletBills[i];
                if (!bb.alive) { bulletBills.splice(i, 1); continue; }
                bb.x += bb.vx;
                // Remove off-screen
                if (bb.x < cam - 100 || bb.x > cam + W + 100) { bulletBills.splice(i, 1); continue; }
                // Mario collision
                if (mario.inv === 0 && !mario.dead && overlap(mario.x, mario.y, mario.w, mario.h, bb.x, bb.y, bb.w, bb.h)) {
                    if (starTimer > 0) {
                        bb.alive = false; score += 200; sfx('stomp'); updateHUD();
                        spawnParticle(bb.x + 10, bb.y + 8, 'star');
                    } else if (mario.y + mario.h - mario.vy <= bb.y + 4) {
                        bb.alive = false; mario.vy = -9; score += 200; sfx('stomp'); updateHUD();
                        spawnParticle(bb.x + 10, bb.y + 8, 'dust');
                        spawnScorePopup(bb.x + 10, bb.y - 8, 200, '#e74c3c');
                    } else {
                        killMario();
                    }
                }
                // Fireball kills bullet bill
                for (const fb of fireballs) {
                    if (!fb.alive) continue;
                    if (overlap(fb.x, fb.y, fb.w, fb.h, bb.x, bb.y, bb.w, bb.h)) {
                        bb.alive = false; fb.alive = false; score += 200; sfx('stomp'); updateHUD();
                        spawnParticle(bb.x + 10, bb.y + 8, 'star');
                    }
                }
            }

            // Hammer Bro AI - jump and throw hammers
            for (const e of enemies) {
                if (!e.alive || e.type !== 'hammerBro' || e.state === 'dead') continue;
                // Throw hammer
                if (e.hammerTimer !== undefined) {
                    e.hammerTimer--;
                    if (e.hammerTimer <= 0) {
                        e.hammerTimer = 80 + Math.floor(Math.random() * 60);
                        const dir = mario.x > e.x ? 1 : -1;
                        hammers.push({ x: e.x + 8, y: e.y - 8, w: 14, h: 14, vx: dir * 3.5, vy: -8, alive: true, rot: 0 });
                        try { beep(440, 0.04, 'sawtooth', 0.12); } catch (ex) { }
                    }
                }
                // Random jumps
                if (e.jumpTimer !== undefined) {
                    e.jumpTimer--;
                    if (e.jumpTimer <= 0 && e.onGround) {
                        e.vy = -10; e.onGround = false;
                        e.jumpTimer = 100 + Math.floor(Math.random() * 60);
                    }
                }
                // Pace back and forth
                if (e.onGround && Math.random() < 0.01) e.vx = -e.vx;
            }

            // Hammer physics
            for (let i = hammers.length - 1; i >= 0; i--) {
                const h = hammers[i];
                h.x += h.vx; h.vy += 0.35; h.y += h.vy; h.rot += 0.3;
                if (h.y > H + 50) { hammers.splice(i, 1); continue; }
                // Mario collision
                if (mario.inv === 0 && !mario.dead && overlap(mario.x, mario.y, mario.w, mario.h, h.x, h.y, h.w, h.h)) {
                    if (starTimer > 0) {
                        hammers.splice(i, 1); score += 100; updateHUD();
                    } else {
                        killMario();
                    }
                }
            }

            if (state !== 'play' && !mario.dead) {
                // Particles still run on screens
                updateParticles(); return;
            }

            if (!mario.dead) {
                const isDash = keys['ShiftLeft'] || keys['ShiftRight'] || btn.dash;
                const spd = isDash ? 6.5 : 3.8;
                const goL = keys['ArrowLeft'] || keys['KeyA'] || btn.left;
                const goR = keys['ArrowRight'] || keys['KeyD'] || btn.right;
                if (goL) { mario.vx += (-spd - mario.vx) * 0.25; mario.facing = -1; }
                else if (goR) { mario.vx += (spd - mario.vx) * 0.25; mario.facing = 1; }
                else mario.vx *= 0.78;
                if (ugMode && mario.x < 0) mario.x = 0;
                if (ugMode) cam = 0;

                // Variable jump cut
                if (!(keys['Space'] || keys['ArrowUp'] || btn.jump) && mario.vy < -4) mario.vy += 1.2;

                // X phase: move then resolve horizontal collisions
                mario.x += mario.vx;
                if (mario.x < 0) mario.x = 0;
                cam = Math.max(0, Math.min(mario.x - W / 3, LW - W));
                for (const p of platforms) { if (Math.abs((p.x + 16) - mario.x) > 260) continue; cX(mario, p); }
                for (const p of pipes) { if (Math.abs((p.x + 32) - mario.x) > 260) continue; cX(mario, p); }

                // Y phase: move then resolve vertical collisions
                mario.vy += GRAVITY; if (mario.vy > 15) mario.vy = 15;
                mario.y += mario.vy;
                mario.onGround = false;
                for (const p of platforms) {
                    if (Math.abs((p.x + 16) - mario.x) > 260) continue;
                    if (p.type === 'hidden' && !p.hit) {
                        const bo = p.bounceOffset || 0, py = p.y - bo;
                        if (overlap(mario.x + 1, mario.y, mario.w - 2, mario.h, p.x, py, p.w, p.h)) {
                            if (mario.y + mario.h / 2 >= py + p.h / 2) { mario.y = py + p.h; mario.vy = 0; hitBlock(p); }
                        }
                        continue;
                    }
                    cY(mario, p, hitBlock);
                }
                for (const p of pipes) { if (Math.abs((p.x + 32) - mario.x) > 260) continue; cY(mario, p, null); }

                // Moving platform collision
                for (const mp of movingPlats) {
                    if (mp.falling && mp.y > H) continue;
                    if (overlap(mario.x + 1, mario.y, mario.w - 2, mario.h, mp.x, mp.y, mp.w, mp.h)) {
                        if (mario.y + mario.h / 2 < mp.y + mp.h / 2) {
                            mario.y = mp.y - mario.h; mario.vy = 0; mario.onGround = true;
                            // Trigger falling platform
                            if (mp.type === 'fall' && !mp.falling) { mp.fallTimer++; if (mp.fallTimer > 30) mp.falling = true; }
                        }
                    }
                }

                // Spring / Trampoline collision
                for (const sp of springs) {
                    if (sp.compressed > 0) { sp.compressed--; continue; }
                    if (overlap(mario.x, mario.y, mario.w, mario.h, sp.x, sp.y, sp.w, sp.h)) {
                        if (mario.y + mario.h - mario.vy <= sp.y + 4) {
                            mario.vy = -20; mario.onGround = false; sp.compressed = 15;
                            sfx('jump'); for (let i = 0; i < 6; i++) spawnParticle(sp.x + 12, sp.y, 'star');
                        }
                    }
                }

                // Walk animation
                if (Math.abs(mario.vx) > 0.5 && mario.onGround) { mario.walkTimer++; if (mario.walkTimer > 5) { mario.walkTimer = 0; mario.walkFrame = (mario.walkFrame + 1) % 3; } }
                else if (mario.onGround) mario.walkFrame = 0;

                if (mario.y > H + 120) killMario();
                if (mario.inv > 0) mario.inv--;

                // Coins
                for (const c of coinItems) {
                    if (c.collected) continue;
                    if (c.pop) { c.popY += c.popVy; c.popVy += 0.4; c.life--; if (c.life <= 0) c.collected = true; continue; }
                    if (overlap(mario.x, mario.y, mario.w, mario.h, c.x, c.y, TILE, TILE)) {
                        c.collected = true; coins++; score += 100; sfx('coin'); updateHUD();
                        spawnScorePopup(c.x + 8, c.y, '+ 100', '#FFD700'); spawnParticle(c.x + 8, c.y, 'coin');
                    }
                }

                // Mushrooms, Flowers, Stars, 1UPs
                for (const m of mushrooms) {
                    if (!m.alive) continue;
                    if (m.type === 'flower' || m.type === 'star') {
                        // stationary items - bob for star
                        if (m.type === 'star') m.bobY = (m.bobY || 0) + 0.1;
                        if (overlap(mario.x, mario.y, mario.w, mario.h, m.x, m.y + (m.type === 'star' ? Math.sin(m.bobY || 0) * 4 : 0), m.w, m.h)) {
                            m.alive = false;
                            if (m.type === 'star') {
                                starTimer = 480; mario.inv = 480; // ~8 seconds
                                sfx('power'); score += 1000; updateHUD();
                                spawnScorePopup(mario.x + 13, mario.y - 10, '★ STAR!', '#FFD700');
                                for (let i = 0; i < 20; i++) spawnParticle(mario.x + 13, mario.y + 24, 'star');
                            } else {
                                upgradeMario('flower');
                                score += 1000; updateHUD(); spawnScorePopup(mario.x + 13, mario.y - 10, '1000', '#FF6B6B');
                            }
                        }
                        continue;
                    }
                    // mushroom / 1up: X then Y
                    m.x += m.vx;
                    for (const p of [...platforms, ...pipes]) { if (Math.abs((p.x + p.w / 2) - m.x) > 220) continue; cX(m, p); }
                    m.vy += GRAVITY; m.y += m.vy; m.onGround = false;
                    for (const p of [...platforms, ...pipes]) { if (Math.abs((p.x + p.w / 2) - m.x) > 220) continue; cY(m, p, null); }
                    if (m.y > H + 100) { m.alive = false; continue; }
                    if (overlap(mario.x, mario.y, mario.w, mario.h, m.x, m.y, m.w, m.h)) {
                        m.alive = false;
                        if (m.type === '1up') {
                            lives++; sfx('1up'); updateHUD();
                            spawnScorePopup(mario.x + 13, mario.y - 10, '1UP!', '#2ecc71');
                            for (let i = 0; i < 10; i++) spawnParticle(mario.x + 13, mario.y + 24, 'star');
                        } else {
                            upgradeMario('mushroom');
                            score += 1000; updateHUD(); spawnScorePopup(mario.x + 13, mario.y - 10, '1000', '#2ecc71');
                        }
                    }
                }

                // Enemies (Goomba + Koopa with shell logic)
                for (const e of enemies) {
                    if (!e.alive) continue;
                    if (e.state === 'dead') { e.squishT--; if (e.squishT <= 0) e.alive = false; continue; }
                    // physics
                    e.x += e.vx;
                    for (const p of [...platforms, ...pipes]) { if (Math.abs((p.x + p.w / 2) - e.x) > 220) continue; cX(e, p); }
                    e.vy += GRAVITY; e.y += e.vy; e.onGround = false;
                    for (const p of [...platforms, ...pipes]) { if (Math.abs((p.x + p.w / 2) - e.x) > 220) continue; cY(e, p, null); }
                    if (e.y > H + 100) { e.alive = false; continue; }
                    if (e.onGround && e.state === 'walk') { e.walkTimer++; if (e.walkTimer > 8) { e.walkTimer = 0; e.walkFrame = (e.walkFrame + 1) % 2; } }
                    // Shell hits other enemies
                    if (e.state === 'shell' && Math.abs(e.vx) > 1) {
                        for (const o of enemies) {
                            if (o === e || !o.alive || o.state === 'dead') continue;
                            if (overlap(e.x, e.y, e.w, e.h, o.x, o.y, o.w, o.h)) {
                                o.state = 'dead'; o.squishT = 20; score += 200; sfx('stomp'); updateHUD();
                                spawnScorePopup(o.x + 8, o.y - 8, 200, '#e74c3c');
                            }
                        }
                    }
                    // Mario collision
                    if (mario.inv === 0 && overlap(mario.x, mario.y, mario.w, mario.h, e.x, e.y, e.w, e.h)) {
                        if (starTimer > 0) {
                            // Star power - instant kill on contact
                            e.state = 'dead'; e.squishT = 20; score += 200; sfx('stomp'); updateHUD();
                            spawnParticle(e.x + 16, e.y + 16, 'star');
                            spawnScorePopup(e.x + 8, e.y - 8, 200, '#FFD700');
                            continue;
                        }
                        const mBot = mario.y + mario.h;
                        if (mBot - mario.vy <= e.y + 6) {
                            combo++; comboTimer = 60;
                            const comboScore = combo <= 1 ? 200 : combo === 2 ? 400 : combo === 3 ? 800 : combo === 4 ? 1600 : 0;
                            if (combo >= 5) { lives++; sfx('1up'); spawnScorePopup(e.x + 8, e.y - 8, '1UP!', '#2ecc71'); }
                            else { score += comboScore; spawnScorePopup(e.x + 8, e.y - 8, comboScore, '#e74c3c'); }
                            mario.vy = -9; sfx('stomp'); updateHUD();
                            spawnParticle(e.x + 16, e.y + 16, 'dust');
                            if (e.type === 'goomba' || e.type === 'hammerBro') { e.state = 'dead'; e.squishT = 28; }
                            else if (e.type === 'koopa' || e.type === 'buzzy') {
                                if (e.state === 'walk') { e.state = 'shell'; e.vx = 0; e.h = TILE * 0.7; e.shellTimer = 300; }
                                else if (e.state === 'shell' && Math.abs(e.vx) < 0.5) { e.vx = mario.facing * 8; }
                                else { e.vx = 0; e.shellTimer = 300; }
                            }
                        } else if (e.state === 'shell' && Math.abs(e.vx) < 0.5) {
                            e.vx = mario.facing * 8; sfx('stomp'); mario.inv = 10;
                        } else { killMario(); }
                    }
                    // shell timer (koopa revives)
                    if (e.state === 'shell') { e.shellTimer--; if (e.shellTimer <= 0) { e.state = 'walk'; e.vx = e.type === 'buzzy' ? -1.6 : -1.3; e.h = e.type === 'koopa' ? TILE * 1.2 : e.type === 'buzzy' ? TILE * 0.85 : TILE; } }
                }

                // Piranha plants
                for (const pr of piranhas) {
                    if (!pr.alive) continue;
                    const t = frame * 0.03 + pr.phase;
                    pr.y = pr.baseY - Math.max(0, Math.sin(t)) * pr.maxUp;
                    // Check if mario is close
                    if (mario.inv === 0 && overlap(mario.x, mario.y, mario.w, mario.h, pr.x, pr.y, pr.w, pr.h)) { killMario(); }
                    // Fireball kills piranha
                    for (const fb of fireballs) {
                        if (!fb.alive) continue;
                        if (overlap(fb.x, fb.y, fb.w, fb.h, pr.x, pr.y, pr.w, pr.h)) {
                            pr.alive = false; fb.alive = false; score += 200; sfx('stomp'); updateHUD();
                            spawnParticle(pr.x + 8, pr.y, pr.h, 'star');
                            spawnScorePopup(pr.x + 8, pr.y - 8, 200, '#27ae60');
                        }
                    }
                }

                // Underground exit check (walking to far right)
                if (ugMode && mario.x > W - 1.5 * TILE && mario.onGround) exitUnderground();

                // Checkpoint detection
                if (checkpoint && !checkpointReached && mario.x > checkpoint.x) {
                    checkpointReached = true;
                    sfx('flag');
                    spawnScorePopup(checkpoint.x, checkpoint.y - TILE * 3, '✓ CHECK!', '#2ecc71');
                    for (let i = 0; i < 10; i++) spawnParticle(checkpoint.x + 8, checkpoint.y - TILE * 2, 'star');
                }

                // Flag (only in overworld) - trigger goal slide
                if (!ugMode && !mario.dead && mario.x + mario.w >= flagPole.x && mario.x <= flagPole.x + 20) {
                    sfx('flag'); stopBGM();
                    goalSlide = { phase: 'slide', t: 0 };
                    mario.vx = 0; mario.vy = 0;
                }

                // Fireballs
                for (let i = fireballs.length - 1; i >= 0; i--) {
                    const fb = fireballs[i];
                    if (!fb.alive) { fireballs.splice(i, 1); continue; }
                    fb.vy += 0.55; fb.x += fb.vx; fb.y += fb.vy;
                    // platform collision (bounce)
                    for (const p of [...platforms, ...pipes]) {
                        const bo = p.bounceOffset || 0, py = p.y - bo;
                        if (!overlap(fb.x, fb.y, fb.w, fb.h, p.x, py, p.w, p.h)) continue;
                        if (fb.y + fb.h / 2 < py + p.h / 2) { fb.y = py - fb.h; fb.vy = -8; fb.bounces++; }
                        else fb.alive = false;
                        break;
                    }
                    if (fb.bounces > 4 || fb.x < cam - 80 || fb.x > cam + W + 80 || fb.y > H + 50) fb.alive = false;
                    for (const e of enemies) {
                        if (!e.alive || e.state === 'dead') continue;
                        if (!overlap(fb.x, fb.y, fb.w, fb.h, e.x, e.y, e.w, e.h)) continue;
                        if (e.type === 'buzzy') {
                            // Buzzy Beetle is fire-resistant! Fireball bounces off
                            fb.alive = false;
                            spawnParticle(e.x + 16, e.y + 16, 'dust');
                            try { beep(150, 0.06, 'sawtooth', 0.1); } catch (ex) { }
                            continue;
                        }
                        e.state = 'dead'; e.vx = 0; e.squishT = 28; fb.alive = false;
                        score += 200; sfx('stomp'); updateHUD();
                        spawnScorePopup(e.x + 8, e.y - 8, 200, '#ff9944');
                        spawnParticle(e.x + 16, e.y + 16, 'star');
                    }
                }
            } else {
                mario.vy += GRAVITY; mario.y += mario.vy;
            }

            updateParticles();
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = scorePopups.length - 1; i >= 0; i--) {
                const p = scorePopups[i]; p.y += p.vy; p.vy *= 0.95; p.life -= 0.02;
                if (p.life <= 0) scorePopups.splice(i, 1);
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // DRAWING
        // ═══════════════════════════════════════════════════════════════
        function drawBG() {
            if (ugMode) {
                ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
                // Underground brick pattern on ceiling/walls
                ctx.fillStyle = '#1a1a2e';
                for (let x = 0; x < W; x += TILE * 3) { ctx.fillRect(x, TILE, 8, 8); ctx.fillRect(x + 16, TILE + 16, 8, 8); }
                return;
            }
            // Gradient sky
            const g = ctx.createLinearGradient(0, 0, 0, H);
            g.addColorStop(0, '#5c94fc'); g.addColorStop(1, '#a8d8f8');
            ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

            // Far mountains (parallax 0.1)
            ctx.fillStyle = '#7aaedc';
            [300, 900, 1800, 3000, 4500, 6000].forEach(mx => {
                const dx = mx - cam * 0.08; if (dx < -200 || dx > W + 200) return;
                ctx.beginPath(); ctx.moveTo(dx, H - TILE); ctx.lineTo(dx + 60, H - TILE - 90); ctx.lineTo(dx + 120, H - TILE); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(dx + 60, H - TILE - 90, 12, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#7aaedc';
            });

            // Mid hills (parallax 0.3)
            ctx.fillStyle = '#5ab552';
            [500, 1200, 2500, 4000, 5500, 7000].forEach(mx => {
                const dx = mx - cam * 0.25; if (dx < -300 || dx > W + 300) return;
                ctx.beginPath(); ctx.moveTo(dx - 20, H - TILE); ctx.lineTo(dx + 90, H - TILE - 70); ctx.lineTo(dx + 200, H - TILE); ctx.fill();
            });

            // Clouds (parallax 0.4)
            [100, 500, 850, 1300, 1800, 2350, 2900, 3600, 4300, 5100, 5900, 6700].forEach((cx, i) => {
                const dx = cx - cam * 0.35; if (dx < -140 || dx > W + 140) return;
                const cy = 50 + (i % 3) * 35;
                ctx.fillStyle = 'rgba(255,255,255,0.92)';
                [[30, 20, 22], [55, 14, 28], [80, 20, 22], [5, 26, 16], [95, 26, 16]].forEach(([ox, oy, r]) => {
                    ctx.beginPath(); ctx.arc(dx + ox, cy + oy, r, 0, Math.PI * 2); ctx.fill();
                });
                ctx.fillRect(dx + 9, cy + 24, 82, 16);
            });
        }

        function drawTile(x, y, type, hit, bounce) {
            const py = y - bounce;
            if (type === 'ground') {
                ctx.fillStyle = '#b05c10'; ctx.fillRect(x, py, TILE, TILE);
                ctx.fillStyle = '#d4812a'; ctx.fillRect(x + 1, py + 1, TILE - 2, TILE - 2);
                ctx.fillStyle = '#b05c10';
                ctx.fillRect(x, py + TILE / 2, TILE, 2); ctx.fillRect(x + TILE / 2, py, 2, TILE / 2);
            } else if (type === 'brick') {
                ctx.fillStyle = '#b23125'; ctx.fillRect(x, py, TILE, TILE);
                ctx.fillStyle = '#d94032'; ctx.fillRect(x + 1, py + 1, TILE - 2, TILE - 2);
                ctx.fillStyle = '#b23125';
                ctx.fillRect(x, py + TILE / 2 - 1, TILE, 2); ctx.fillRect(x + TILE / 2, py, 2, TILE / 2);
                ctx.fillRect(x + TILE / 4, py + TILE / 2 + 1, 2, TILE / 2); ctx.fillRect(x + 3 * TILE / 4, py + TILE / 2 + 1, 2, TILE / 2);
                // Shading
                ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(x, py, TILE, 2); ctx.fillRect(x, py, 2, TILE);
                ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fillRect(x, py + TILE - 2, TILE, 2); ctx.fillRect(x + TILE - 2, py, 2, TILE);
            } else if (type === 'question') {
                if (hit) {
                    ctx.fillStyle = '#7f8c8d'; ctx.fillRect(x, py, TILE, TILE);
                    ctx.fillStyle = '#95a5a6'; ctx.fillRect(x + 2, py + 2, TILE - 4, TILE - 4);
                    ctx.fillStyle = '#606060'; ctx.fillRect(x + 10, py + 8, 12, 16);
                } else {
                    const pulse = Math.sin(frame * 0.12) * 0.12 + 0.88;
                    ctx.fillStyle = `hsl(42,100%,${Math.floor(52 * pulse)}%)`; ctx.fillRect(x, py, TILE, TILE);
                    // Inset border
                    ctx.fillStyle = `hsl(30,100%,${Math.floor(38 * pulse)}%)`; ctx.fillRect(x, py, TILE, 1); ctx.fillRect(x, py, 1, TILE);
                    ctx.fillStyle = `hsl(50,100%,${Math.floor(70 * pulse)}%)`; ctx.fillRect(x, py + TILE - 1, TILE, 1); ctx.fillRect(x + TILE - 1, py, 1, TILE);
                    // ? mark
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px monospace'; ctx.textAlign = 'center';
                    ctx.fillText('?', x + TILE / 2, py + TILE - 7);
                }
            }
        }

        function drawPipe(x, y, w, h) {
            // Body
            ctx.fillStyle = '#1e8c2a'; ctx.fillRect(x, y, w, h);
            ctx.fillStyle = '#27ae60'; ctx.fillRect(x + 2, y + 2, w - 4, h - 2);
            // Highlight
            ctx.fillStyle = '#2ecc71'; ctx.fillRect(x + 4, y + 2, 6, h - 4);
            // Rim
            ctx.fillStyle = '#1e8c2a'; ctx.fillRect(x - 4, y, w + 8, 16);
            ctx.fillStyle = '#27ae60'; ctx.fillRect(x - 2, y + 2, w + 4, 12);
            ctx.fillStyle = '#2ecc71'; ctx.fillRect(x, y + 3, 6, 8);
        }

        function drawMario(mx, my, facing, wf, dead, big) {
            ctx.save();
            if (mario.inv > 0 && Math.floor(frame / 4) % 2 === 0) { ctx.restore(); return; }
            if (facing === -1) { ctx.translate(mx + 26, 0); ctx.scale(-1, 1); mx = 0; } else { ctx.translate(mx, 0); mx = 0; }
            const py = my;
            const skinColor = '#FBD000', hatColor = '#E52521', overallColor = '#E52521';
            const shirtColor = mario.power === 'fire' ? '#fff' : '#0033cc';

            if (dead) {
                ctx.fillStyle = hatColor; ctx.fillRect(mx + 4, py, 20, 7);
                ctx.fillStyle = skinColor; ctx.fillRect(mx + 6, py + 7, 16, 8);
                ctx.fillStyle = overallColor; ctx.fillRect(mx + 2, py + 15, 24, 12);
                ctx.restore(); return;
            }

            if (big) {
                // BIG MARIO
                ctx.fillStyle = hatColor; ctx.fillRect(mx + 4, py, 20, 8); ctx.fillRect(mx, py + 5, 28, 7);
                ctx.fillStyle = skinColor; ctx.fillRect(mx + 4, py + 10, 20, 14);
                ctx.fillStyle = '#000'; ctx.fillRect(mx + 6, py + 13, 5, 4); ctx.fillRect(mx + 16, py + 13, 5, 4);
                ctx.fillStyle = skinColor; ctx.fillRect(mx + 9, py + 19, 10, 4);
                ctx.fillStyle = '#4B2800'; ctx.fillRect(mx + 3, py + 21, 8, 4); ctx.fillRect(mx + 17, py + 21, 8, 4);
                ctx.fillStyle = shirtColor; ctx.fillRect(mx + 4, py + 24, 20, 18);
                ctx.fillStyle = skinColor; ctx.fillRect(mx - 4, py + 24, 8, 8); ctx.fillRect(mx + 24, py + 24, 8, 8);
                const lo = wf === 1 ? [-4, 4] : wf === 2 ? [4, -4] : [0, 0];
                ctx.fillStyle = '#4B2800'; ctx.fillRect(mx + 4 + lo[0], py + 42, 10, 10); ctx.fillRect(mx + 18 + lo[1], py + 42, 10, 10);
                ctx.fillStyle = '#000'; ctx.fillRect(mx + 2 + lo[0], py + 47, 12, 5); ctx.fillRect(mx + 16 + lo[1], py + 47, 12, 5);
            } else {
                // SMALL MARIO
                ctx.fillStyle = hatColor; ctx.fillRect(mx + 4, py, 20, 6); ctx.fillRect(mx, py + 4, 28, 6);
                ctx.fillStyle = skinColor; ctx.fillRect(mx + 4, py + 8, 20, 10);
                ctx.fillStyle = '#000'; ctx.fillRect(mx + 7, py + 10, 4, 3); ctx.fillRect(mx + 17, py + 10, 4, 3);
                ctx.fillStyle = skinColor; ctx.fillRect(mx + 10, py + 14, 8, 3);
                ctx.fillStyle = '#4B2800'; ctx.fillRect(mx + 4, py + 16, 8, 3); ctx.fillRect(mx + 18, py + 16, 6, 3);
                ctx.fillStyle = overallColor; ctx.fillRect(mx + 4, py + 18, 20, 14);
                ctx.fillStyle = '#FFD700'; ctx.fillRect(mx + 9, py + 20, 4, 4); ctx.fillRect(mx + 17, py + 20, 4, 4);
                ctx.fillStyle = skinColor; ctx.fillRect(mx - 4, py + 18, 8, 6); ctx.fillRect(mx + 24, py + 18, 8, 6);
                const lo = wf === 1 ? [-4, 4] : wf === 2 ? [4, -4] : [0, 0];
                ctx.fillStyle = '#4B2800'; ctx.fillRect(mx + 4 + lo[0], py + 32, 10, 8); ctx.fillRect(mx + 18 + lo[1], py + 32, 10, 8);
                ctx.fillStyle = '#000'; ctx.fillRect(mx + 2 + lo[0], py + 37, 12, 4); ctx.fillRect(mx + 16 + lo[1], py + 37, 12, 4);
            }
            ctx.restore();
        }

        function drawGoomba(x, y, squished, wf) {
            const sy = squished ? y + TILE - 10 : y;
            const sh = squished ? 10 : TILE;
            ctx.fillStyle = '#a0522d'; ctx.fillRect(x, sy, TILE, sh);
            ctx.fillStyle = '#c47a3a'; ctx.fillRect(x + 2, sy + 2, TILE - 4, sh - 4);
            if (!squished) {
                ctx.fillStyle = '#fff'; ctx.fillRect(x + 3, y + 5, 11, 9); ctx.fillRect(x + 18, y + 5, 11, 9);
                ctx.fillStyle = '#000'; ctx.fillRect(x + 5, y + 7, 7, 5); ctx.fillRect(x + 20, y + 7, 7, 5);
                ctx.fillStyle = '#fff'; ctx.fillRect(x + 10, y + 8, 3, 3); ctx.fillRect(x + 25, y + 8, 3, 3);
                ctx.fillStyle = '#000'; ctx.fillRect(x + 2, y + 3, 13, 3); ctx.fillRect(x + 17, y + 3, 13, 3);
                const fo = wf === 0 ? [-2, 2] : [2, -2];
                ctx.fillStyle = '#4B2800'; ctx.fillRect(x + 3 + fo[0], y + TILE - TILE * 0.3, 10, TILE * 0.3); ctx.fillRect(x + 19 + fo[1], y + TILE - TILE * 0.3, 10, TILE * 0.3);
            }
        }

        function drawKoopa(e) {
            const x = e.x, y = e.y;
            if (e.state === 'shell') {
                // Green shell
                ctx.fillStyle = '#1a6d1a'; ctx.fillRect(x + 2, y + 2, e.w - 4, e.h - 4);
                ctx.fillStyle = '#27ae60';
                ctx.beginPath(); ctx.arc(x + e.w / 2, y + e.h / 2, e.w / 2 - 4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#2ecc71'; ctx.fillRect(x + 8, y + 4, 4, e.h - 8);
                // Spinning effect when moving
                if (Math.abs(e.vx) > 1) {
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(x + 6 + Math.sin(frame * 0.4) * 6, y + 3, 3, e.h - 6);
                }
            } else if (e.state === 'dead') {
                ctx.fillStyle = '#a0522d'; ctx.fillRect(x, y + TILE - 10, TILE, 10);
            } else {
                // Walking Koopa
                const h = e.h;
                // Shell (back)
                ctx.fillStyle = '#1a6d1a'; ctx.fillRect(x + 2, y + h * 0.25, TILE - 4, h * 0.55);
                ctx.fillStyle = '#27ae60'; ctx.fillRect(x + 4, y + h * 0.3, TILE - 8, h * 0.45);
                ctx.fillStyle = '#2ecc71'; ctx.fillRect(x + 8, y + h * 0.3, 4, h * 0.4);
                // Head
                ctx.fillStyle = '#27ae60'; ctx.fillRect(x + 6, y, 20, h * 0.35);
                // Eyes
                ctx.fillStyle = '#fff'; ctx.fillRect(x + 10, y + 4, 8, 6);
                ctx.fillStyle = '#000'; ctx.fillRect(x + 14, y + 5, 4, 4);
                // Feet
                const fo = e.walkFrame === 0 ? [-2, 2] : [2, -2];
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(x + 4 + fo[0], y + h - 8, 10, 8); ctx.fillRect(x + 18 + fo[1], y + h - 8, 10, 8);
            }
        }

        function drawBuzzy(e) {
            const x = e.x, y = e.y;
            if (e.state === 'shell') {
                // Blue shell (similar to koopa shell but blue)
                ctx.fillStyle = '#1a3d6d'; ctx.fillRect(x + 2, y + 2, e.w - 4, e.h - 4);
                ctx.fillStyle = '#2980b9';
                ctx.beginPath(); ctx.arc(x + e.w / 2, y + e.h / 2, e.w / 2 - 4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#3498db'; ctx.fillRect(x + 8, y + 4, 4, e.h - 8);
                if (Math.abs(e.vx) > 1) {
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(x + 6 + Math.sin(frame * 0.4) * 6, y + 3, 3, e.h - 6);
                }
            } else if (e.state === 'dead') {
                ctx.fillStyle = '#2c3e50'; ctx.fillRect(x + 4, y + TILE - 8, TILE - 8, 8);
            } else {
                // Walking Buzzy Beetle - blue shelled bug
                const h = e.h;
                // Shell (rounded dark blue)
                ctx.fillStyle = '#1a3d6d'; ctx.fillRect(x + 2, y + 2, TILE - 4, h * 0.7);
                ctx.fillStyle = '#2980b9'; ctx.fillRect(x + 4, y + 4, TILE - 8, h * 0.6);
                ctx.fillStyle = '#3498db'; ctx.fillRect(x + 8, y + 4, 5, h * 0.5);
                // Face
                ctx.fillStyle = '#f5d76e'; ctx.fillRect(x + 4, y + h * 0.5, 10, h * 0.3);
                // Eyes
                ctx.fillStyle = '#fff'; ctx.fillRect(x + 5, y + h * 0.5, 5, 4);
                ctx.fillStyle = '#000'; ctx.fillRect(x + 6, y + h * 0.52, 3, 3);
                // Feet
                const fo = e.walkFrame === 0 ? [-2, 2] : [2, -2];
                ctx.fillStyle = '#f5d76e'; ctx.fillRect(x + 4 + fo[0], y + h - 6, 8, 6); ctx.fillRect(x + 18 + fo[1], y + h - 6, 8, 6);
            }
        }

        function drawPiranha(pr) {
            const x = pr.x, y = pr.y;
            // Stem
            ctx.fillStyle = '#1a6d1a'; ctx.fillRect(x + 4, y + pr.h * 0.4, 8, pr.h * 0.6);
            // Head
            const chomp = Math.sin(frame * 0.15) > 0 ? 0 : 3;
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(x - 2, y, 20, pr.h * 0.5 - chomp);
            // Spots
            ctx.fillStyle = '#c0392b'; ctx.fillRect(x + 2, y + 3, 5, 5); ctx.fillRect(x + 10, y + 3, 5, 5);
            // Lips
            ctx.fillStyle = '#2ecc71'; ctx.fillRect(x - 2, y + pr.h * 0.5 - chomp - 4, 20, 4);
        }

        function drawMushroom(m) {
            if (m.type === 'flower') { drawFlower(m); return; }
            if (m.type === 'star') { drawStarItem(m); return; }
            const is1up = m.type === '1up';
            // Stalk
            ctx.fillStyle = '#f5e6c8'; ctx.fillRect(m.x + 4, m.y + 12, 16, 12);
            // Cap
            ctx.fillStyle = is1up ? '#2ecc71' : '#e74c3c'; ctx.fillRect(m.x, m.y, m.w, 16);
            ctx.fillStyle = '#fff'; ctx.fillRect(m.x + 3, m.y + 3, 7, 7); ctx.fillRect(m.x + 14, m.y + 3, 7, 7);
            ctx.fillStyle = is1up ? '#1a9c5a' : '#c0392b'; ctx.fillRect(m.x, m.y + 12, m.w, 4);
        }

        function drawFlower(f) {
            // Stem
            ctx.fillStyle = '#27ae60'; ctx.fillRect(f.x + 10, f.y + 14, 4, 10);
            // Petals (4 directions)
            const bob = Math.sin(frame * 0.1) * 2;
            [[-8, 0, '#e74c3c'], [8, 0, '#e74c3c'], [0, -8, '#e74c3c'], [0, 8, '#e74c3c']].forEach(([dx, dy, c]) => {
                ctx.fillStyle = c; ctx.beginPath(); ctx.arc(f.x + 12 + dx, f.y + 8 + dy + bob, 5, 0, Math.PI * 2); ctx.fill();
            });
            ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(f.x + 12, f.y + 8 + bob, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#F39C12'; ctx.beginPath(); ctx.arc(f.x + 12, f.y + 8 + bob, 3, 0, Math.PI * 2); ctx.fill();
        }

        function drawFireball(fb) {
            ctx.save();
            const gd = ctx.createRadialGradient(fb.x + 6, fb.y + 6, 0, fb.x + 6, fb.y + 6, 9);
            gd.addColorStop(0, '#fff'); gd.addColorStop(0.35, '#ff9900'); gd.addColorStop(1, 'rgba(255,80,0,0)');
            ctx.fillStyle = gd;
            ctx.beginPath(); ctx.arc(fb.x + 6, fb.y + 6, 9, 0, Math.PI * 2); ctx.fill();
            // spark trail
            ctx.fillStyle = 'rgba(255,200,0,0.5)';
            ctx.fillRect(fb.x + 6 - fb.vx * 0.5, fb.y + 4, 4, 4);
            ctx.restore();
        }

        function drawCoinItem(x, y) {
            const squeeze = Math.abs(Math.cos(frame * 0.18));
            ctx.save(); ctx.translate(x + TILE / 2, y + TILE / 2); ctx.scale(squeeze, 1);
            ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#F39C12'; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#FFD700'; ctx.fillRect(-2, -4, 4, 8);
            ctx.restore();
        }

        function drawStarItem(m) {
            const bob = Math.sin((m.bobY || 0)) * 4;
            const hue = (frame * 8) % 360;
            ctx.save(); ctx.translate(m.x + 12, m.y + 12 + bob);
            ctx.fillStyle = `hsl(${hue},100%,60%)`;
            // 5-pointed star shape
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const a = (i * 72 - 90) * Math.PI / 180;
                const r = i === 0 ? 12 : 12;
                ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                const a2 = ((i * 72) + 36 - 90) * Math.PI / 180;
                ctx.lineTo(Math.cos(a2) * 5, Math.sin(a2) * 5);
            }
            ctx.closePath(); ctx.fill();
            // Glow
            ctx.fillStyle = `hsla(${hue},100%,80%,0.5)`;
            ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function drawMovingPlat(mp) {
            const gd = ctx.createLinearGradient(mp.x, mp.y, mp.x, mp.y + mp.h);
            gd.addColorStop(0, '#e67e22'); gd.addColorStop(0.5, '#f39c12'); gd.addColorStop(1, '#d35400');
            ctx.fillStyle = gd; ctx.fillRect(mp.x, mp.y, mp.w, mp.h);
            // Rivets
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(mp.x + 4, mp.y + 3, 5, 5);
            ctx.fillRect(mp.x + mp.w - 9, mp.y + 3, 5, 5);
            // Falling platform shake
            if (mp.type === 'fall' && mp.fallTimer > 15 && !mp.falling) {
                ctx.translate(Math.random() * 2 - 1, 0);
            }
        }

        function drawSpring(sp) {
            const comp = sp.compressed > 0 ? 8 : 0;
            // Base
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(sp.x, sp.y + sp.h - 6, sp.w, 6);
            // Coil
            ctx.fillStyle = '#f1c40f';
            for (let i = 0; i < 3; i++) {
                ctx.fillRect(sp.x + 2, sp.y + 4 + i * 6 + comp, sp.w - 4, 3);
            }
            // Top
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(sp.x - 2, sp.y + comp, sp.w + 4, 5);
        }

        function drawCheckpoint(cp) {
            // Pole
            ctx.fillStyle = cp.reached ? '#2ecc71' : '#888';
            ctx.fillRect(cp.x + 6, cp.y - TILE * 3, 4, TILE * 3);
            // Flag
            if (cp.reached) {
                ctx.fillStyle = '#2ecc71';
                ctx.beginPath(); ctx.moveTo(cp.x + 10, cp.y - TILE * 3);
                ctx.lineTo(cp.x + 30, cp.y - TILE * 3 + 10); ctx.lineTo(cp.x + 10, cp.y - TILE * 3 + 20); ctx.fill();
            } else {
                ctx.fillStyle = '#e74c3c';
                ctx.beginPath(); ctx.moveTo(cp.x + 10, cp.y - TILE * 3);
                ctx.lineTo(cp.x + 30, cp.y - TILE * 3 + 10); ctx.lineTo(cp.x + 10, cp.y - TILE * 3 + 20); ctx.fill();
            }
            // Ball on top
            ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(cp.x + 8, cp.y - TILE * 3, 5, 0, Math.PI * 2); ctx.fill();
        }

        function drawFlag() {
            // Note: called inside ctx.translate(-cam,0) so use world coords directly
            const fx = flagPole.x;
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(fx + 8, H - TILE, 6, TILE);
            // Pole
            const poleGrad = ctx.createLinearGradient(fx + 6, 0, fx + 12, 0);
            poleGrad.addColorStop(0, '#bbb'); poleGrad.addColorStop(0.5, '#fff'); poleGrad.addColorStop(1, '#888');
            ctx.fillStyle = poleGrad; ctx.fillRect(fx + 6, H - TILE - flagPole.h, 6, flagPole.h);
            // Flag wave
            ctx.fillStyle = '#E52521';
            ctx.beginPath(); ctx.moveTo(fx + 12, H - TILE - flagPole.h); ctx.quadraticCurveTo(fx + 42, H - TILE - flagPole.h + 15 + Math.sin(frame * 0.1) * 5, fx + 12, H - TILE - flagPole.h + 32); ctx.fill();
            // Castle
            const cx = fx + 50;
            ctx.fillStyle = '#c8c8c8'; ctx.fillRect(cx, H - TILE - 140, 100, 140);
            ctx.fillStyle = '#b0b0b0';
            [0, 22, 44, 66, 88].forEach(ox => { ctx.fillRect(cx + ox, H - TILE - 155, 18, 17); });
            ctx.fillStyle = '#888'; ctx.fillRect(cx + 35, H - TILE - 50, 30, 50);
            ctx.fillStyle = '#333'; ctx.fillRect(cx + 45, H - TILE - 50, 10, 20);
            // Windows
            ctx.fillStyle = '#555'; ctx.fillRect(cx + 10, H - TILE - 100, 18, 22); ctx.fillRect(cx + 72, H - TILE - 100, 18, 22);
        }

        function drawParticles() {
            for (const p of particles) {
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            }
            ctx.globalAlpha = 1;
        }

        function drawScorePopups() {
            for (const p of scorePopups) {
                // p.x is world coord; ctx already has translate(-cam), so subtract cam
                ctx.globalAlpha = Math.min(1, p.life * 3);
                ctx.fillStyle = p.color;
                ctx.font = 'bold 11px "Press Start 2P",monospace';
                ctx.textAlign = 'center';
                ctx.fillText(p.val, p.x - cam, p.y);
            }
            ctx.globalAlpha = 1;
            ctx.textAlign = 'left'; // reset
        }

        function drawOverlay(title, sub, bgColor) {
            // Dim
            ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H);
            // Box with gradient
            const bw = 580, bh = 200, bx = (W - bw) / 2, by = (H - bh) / 2 - 20;
            const boxG = ctx.createLinearGradient(bx, by, bx, by + bh);
            boxG.addColorStop(0, bgColor + 'dd'); boxG.addColorStop(1, '#000000cc');
            ctx.fillStyle = boxG; ctx.fillRect(bx, by, bw, bh);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2; ctx.strokeRect(bx + 1, by + 1, bw - 2, bh - 2);
            // Title
            ctx.fillStyle = '#fff'; ctx.font = 'bold 30px "Press Start 2P",monospace'; ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 8;
            ctx.fillText(title, W / 2, by + 65);
            ctx.font = '11px "Press Start 2P",monospace'; ctx.shadowBlur = 4;
            sub.split('\n').forEach((l, i) => ctx.fillText(l, W / 2, by + 105 + i * 28));
            ctx.shadowBlur = 0;
        }

        function draw() {
            // Screen shake transform
            const sx = shakeX * (Math.random() * 2 - 1), sy = shakeY * (Math.random() * 2 - 1);
            ctx.save(); ctx.translate(sx, sy);

            // Intro screen
            if (state === 'intro') {
                ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 24px "Press Start 2P",monospace'; ctx.textAlign = 'center';
                ctx.fillText(`WORLD  ${currentWorld}-${currentLevel}`, W / 2, H / 2 - 30);
                ctx.font = '14px "Press Start 2P",monospace';
                ctx.fillText(`× ${lives}`, W / 2 + 30, H / 2 + 20);
                // Mini Mario icon
                ctx.fillStyle = '#E52521'; ctx.fillRect(W / 2 - 20, H / 2 + 6, 16, 10);
                ctx.fillStyle = '#FBD000'; ctx.fillRect(W / 2 - 18, H / 2 + 16, 12, 6);
                ctx.textAlign = 'left'; ctx.restore();
                return;
            }

            drawBG();
            ctx.save(); ctx.translate(-cam, 0);

            // Ground + blocks
            for (const p of platforms) {
                if (p.type === 'hidden' && !p.hit) continue;
                if (p.x + p.w < cam - 10 || p.x > cam + W + 10) continue;
                drawTile(p.x, p.y, p.type, p.hit, p.bounceOffset || 0);
            }
            // Moving platforms
            for (const mp of movingPlats) { if (!(mp.falling && mp.y > H)) drawMovingPlat(mp); }
            // Springs
            for (const sp of springs) drawSpring(sp);
            // Checkpoint
            if (checkpoint) drawCheckpoint(checkpoint);
            // Pipes
            for (const p of pipes) {
                if (p.x + p.w < cam - 10 || p.x > cam + W + 10) continue;
                drawPipe(p.x, p.y, p.w, p.h);
                if (p.isWarp && !p.used) {
                    ctx.fillStyle = 'rgba(255,255,255,' + (0.5 + Math.sin(frame * 0.08) * 0.3) + ')';
                    ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center';
                    ctx.fillText('▼', p.x + p.w / 2, p.y - 6); ctx.textAlign = 'left';
                }
                if (p.isExit) {
                    ctx.fillStyle = 'rgba(255,255,100,' + (0.5 + Math.sin(frame * 0.08) * 0.4) + ')';
                    ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center';
                    ctx.fillText('▼ EXIT', p.x + p.w / 2, p.y - 6); ctx.textAlign = 'left';
                }
            }
            // Piranhas
            for (const pr of piranhas) { if (!pr.alive) continue; drawPiranha(pr); }
            // Cannons
            for (const cn of cannons) {
                if (cn.x + cn.w < cam - 10 || cn.x > cam + W + 10) continue;
                // Cannon body
                ctx.fillStyle = '#1a1a1a'; ctx.fillRect(cn.x, cn.y, cn.w, cn.h);
                ctx.fillStyle = '#333'; ctx.fillRect(cn.x + 2, cn.y + 2, cn.w - 4, cn.h - 4);
                // Skull emblem
                ctx.fillStyle = '#888';
                ctx.beginPath(); ctx.arc(cn.x + cn.w / 2, cn.y + 14, 8, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#333';
                ctx.fillRect(cn.x + cn.w / 2 - 4, cn.y + 10, 3, 3);
                ctx.fillRect(cn.x + cn.w / 2 + 1, cn.y + 10, 3, 3);
                // Muzzle flash when about to fire
                if (cn.timer < 10) {
                    ctx.fillStyle = `rgba(255,${150 + Math.random() * 100},0,${0.5 + Math.random() * 0.5})`;
                    ctx.beginPath(); ctx.arc(cn.x + cn.w / 2, cn.y - 4, 8 + Math.random() * 4, 0, Math.PI * 2); ctx.fill();
                }
            }
            // Bullet Bills
            for (const bb of bulletBills) {
                if (!bb.alive) continue;
                const dir = bb.vx > 0 ? 1 : -1;
                ctx.fillStyle = '#111'; ctx.fillRect(bb.x, bb.y, bb.w, bb.h);
                ctx.fillStyle = '#333'; ctx.fillRect(bb.x + (dir > 0 ? 2 : 4), bb.y + 2, bb.w - 6, bb.h - 4);
                // Nose
                ctx.fillStyle = '#111';
                ctx.fillRect(dir > 0 ? bb.x + bb.w - 2 : bb.x, bb.y + 2, 4, bb.h - 4);
                // Eye
                ctx.fillStyle = '#fff';
                ctx.fillRect(bb.x + (dir > 0 ? 4 : bb.w - 8), bb.y + 4, 4, 4);
                ctx.fillStyle = '#000';
                ctx.fillRect(bb.x + (dir > 0 ? 5 : bb.w - 7), bb.y + 5, 2, 2);
                // Trail flame
                ctx.fillStyle = `rgba(255,${100 + Math.random() * 100},0,0.7)`;
                ctx.fillRect(dir > 0 ? bb.x - 6 : bb.x + bb.w + 2, bb.y + 4, 6, bb.h - 8);
            }
            // Hammers
            for (const h of hammers) {
                ctx.save();
                ctx.translate(h.x + 7, h.y + 7);
                ctx.rotate(h.rot);
                // Handle
                ctx.fillStyle = '#8B4513'; ctx.fillRect(-2, 0, 4, 10);
                // Head
                ctx.fillStyle = '#666'; ctx.fillRect(-6, -6, 12, 8);
                ctx.fillStyle = '#888'; ctx.fillRect(-5, -5, 10, 6);
                ctx.restore();
            }
            // Mushrooms & Flowers & Stars
            for (const m of mushrooms) { if (!m.alive) continue; drawMushroom(m); }
            // Fireballs
            for (const fb of fireballs) { if (fb.alive) drawFireball(fb); }
            // Coins
            for (const c of coinItems) {
                if (c.collected) continue;
                if (c.pop) { drawCoinItem(c.x, c.popY); continue; }
                if (c.x + TILE < cam || c.x > cam + W) continue;
                drawCoinItem(c.x, c.y);
            }
            // Enemies
            for (const e of enemies) {
                if (!e.alive) continue; if (e.x + e.w < cam - 10 || e.x > cam + W + 10) continue;
                if (e.type === 'koopa') drawKoopa(e);
                else if (e.type === 'buzzy') drawBuzzy(e);
                else if (e.type === 'hammerBro') {
                    // Draw Hammer Bro (armored goomba-like, taller)
                    const x = e.x, y = e.y;
                    if (e.state === 'dead') {
                        ctx.fillStyle = '#556b2f'; ctx.fillRect(x + 4, y + e.h - 10, TILE - 8, 10);
                    } else {
                        // Helmet
                        ctx.fillStyle = '#556b2f'; ctx.fillRect(x + 2, y, TILE - 4, e.h * 0.3);
                        ctx.fillStyle = '#6b8e23'; ctx.fillRect(x + 4, y + 2, TILE - 8, e.h * 0.25);
                        // Body
                        ctx.fillStyle = '#8fbc8f'; ctx.fillRect(x + 4, y + e.h * 0.3, TILE - 8, e.h * 0.4);
                        // Eyes
                        ctx.fillStyle = '#fff'; ctx.fillRect(x + 6, y + e.h * 0.12, 7, 5);
                        ctx.fillRect(x + 18, y + e.h * 0.12, 7, 5);
                        ctx.fillStyle = '#000'; ctx.fillRect(x + 8, y + e.h * 0.14, 4, 3);
                        ctx.fillRect(x + 20, y + e.h * 0.14, 4, 3);
                        // Feet
                        const fo = e.walkFrame === 0 ? [-2, 2] : [2, -2];
                        ctx.fillStyle = '#556b2f';
                        ctx.fillRect(x + 4 + fo[0], y + e.h - 8, 10, 8);
                        ctx.fillRect(x + 18 + fo[1], y + e.h - 8, 10, 8);
                        // Raised arm (holding hammer)
                        ctx.fillStyle = '#8fbc8f'; ctx.fillRect(x + 22, y - 6, 6, 10);
                        ctx.fillStyle = '#666'; ctx.fillRect(x + 20, y - 12, 10, 6);
                    }
                }
                else drawGoomba(e.x, e.y, e.state === 'dead', e.walkFrame);
            }
            // Flag + castle (overworld only)
            if (!ugMode && flagPole.x - cam > -200 && flagPole.x - cam < W + 200) drawFlag();
            // Star aura on Mario
            if (starTimer > 0) {
                const hue = (frame * 12) % 360;
                ctx.fillStyle = `hsla(${hue},100%,60%,0.3)`;
                ctx.beginPath(); ctx.arc(mario.x + 13, mario.y + mario.h / 2, 22, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = `hsla(${(hue + 120) % 360},100%,70%,0.2)`;
                ctx.beginPath(); ctx.arc(mario.x + 13, mario.y + mario.h / 2, 28, 0, Math.PI * 2); ctx.fill();
            }
            // Mario
            drawMario(mario.x, mario.y, mario.facing, mario.walkFrame, mario.dead, mario.big);
            // Particles
            drawParticles();

            ctx.restore();
            drawScorePopups();

            // Combo counter HUD
            if (combo > 1 && comboTimer > 0) {
                ctx.fillStyle = `rgba(255,100,50,${Math.min(1, comboTimer / 20)})`;
                ctx.font = 'bold 16px "Press Start 2P",monospace'; ctx.textAlign = 'center';
                ctx.fillText(`×${combo} COMBO!`, W / 2, 60);
                ctx.textAlign = 'left';
            }

            // Overlays
            ctx.restore();
            if (state === 'start') drawOverlay('SUPER MARIO', 'クリック or SPACE でスタート', '#1a1a5e');
            if (state === 'dead') drawOverlay('やられた！', `残り${lives}機\nクリック or SPACE で続ける`, '#4a1a1a');
            if (state === 'over') drawOverlay('GAME OVER', 'クリック or SPACE でリスタート', '#2d0000');
            if (state === 'win') drawOverlay('🎉 COURSE CLEAR!', `スコア: ${score}\nクリック or SPACE で次へ`, '#0a3a0a');
        }

        // Main loop
        (function loop() { update(); draw(); requestAnimationFrame(loop); })();
    </script>
</body>

</html>
