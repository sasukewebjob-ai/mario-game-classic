<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Bros</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden
        }

        #wrap {
            position: relative;
            display: inline-block
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            border: 3px solid #444
        }

        #hud {
            width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 11px;
            padding: 7px 14px;
            background: linear-gradient(to bottom, #1a1a2e, #111);
            border-bottom: 2px solid #333;
            letter-spacing: 1px
        }

        #hud span {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px
        }

        #hud label {
            color: #aaa;
            font-size: 8px
        }

        #hud b {
            color: #fff;
            font-size: 13px
        }

        #controls {
            width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: linear-gradient(to bottom, #111, #0a0a0a);
            border-top: 2px solid #333
        }

        .btn-group {
            display: flex;
            gap: 12px
        }

        .ctrl-btn {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            border: 2px solid #444;
            background: linear-gradient(145deg, #2c2c2c, #1a1a1a);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.08s;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 0 #000
        }

        .ctrl-btn:active,
        .ctrl-btn.pressed {
            background: linear-gradient(145deg, #c0392b, #922b21);
            border-color: #e74c3c;
            transform: translateY(3px);
            box-shadow: 0 1px 0 #000
        }

        #btn-jump {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(145deg, #c0392b, #922b21);
            border-color: #e74c3c;
            font-size: 26px;
            box-shadow: 0 5px 0 #6b1f1f
        }

        #btn-jump:active,
        #btn-jump.pressed {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #6b1f1f
        }

        #lives-icons {
            display: flex;
            gap: 4px;
            align-items: center
        }

        .hint {
            color: #444;
            font-size: 8px;
            text-align: center;
            line-height: 2
        }
    </style>
</head>

<body>
    <div id="wrap">
        <div id="hud">
            <span><label>MARIO</label><b id="hScore">000000</b></span>
            <span><label>🪙 COIN</label><b id="hCoins">×00</b></span>
            <span><label>WORLD</label><b id="hWorld">1-1</b></span>
            <span><label>TIME</label><b id="hTime">400</b></span>
            <div id="lives-icons"></div>
        </div>
        <canvas id="game" width="800" height="450"></canvas>
        <div id="controls">
            <div class="btn-group">
                <button class="ctrl-btn" id="btn-left">◀</button>
                <button class="ctrl-btn" id="btn-right">▶</button>
                <button class="ctrl-btn" id="btn-down" style="font-size:14px">▼</button>
            </div>
            <div class="hint">クリック・タップ<br>⬅➡⬆⬇ Shift:ダッシュ Z:火の玉</div>
            <div class="btn-group">
                <button class="ctrl-btn" id="btn-dash" style="font-size:13px">💨</button>
                <button class="ctrl-btn" id="btn-fire" style="font-size:18px">🔥</button>
                <button class="ctrl-btn" id="btn-jump">↑</button>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // CONSTANTS
        // ═══════════════════════════════════════════════════════════════
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const W = 800, H = 450, TILE = 32, GRAVITY = 0.52, LW = 8000;

        // ═══════════════════════════════════════════════════════════════
        // AUDIO ENGINE
        // ═══════════════════════════════════════════════════════════════
        const AC = new (window.AudioContext || window.webkitAudioContext)();
        let bgmNode = null, bgmGain = null;

        function beep(freq, dur, type = 'square', vol = 0.12, delay = 0) {
            const t = AC.currentTime + delay;
            const o = AC.createOscillator(), g = AC.createGain();
            o.connect(g); g.connect(AC.destination);
            o.type = type; o.frequency.setValueAtTime(freq, t);
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + dur);
            o.start(t); o.stop(t + dur + 0.01);
        }

        function sfx(name) {
            try {
                if (name === 'jump') { beep(220, 0.05, 'square', 0.1); beep(440, 0.08, 'square', 0.12, 0.04); beep(660, 0.06, 'sine', 0.1, 0.1); }
                if (name === 'coin') { beep(988, 0.05, 'sine', 0.18); beep(1319, 0.14, 'sine', 0.18, 0.05); }
                if (name === 'stomp') { beep(180, 0.04, 'sawtooth', 0.15); beep(120, 0.1, 'sawtooth', 0.1, 0.04); }
                if (name === 'die') { beep(494, 0.07, 'square', 0.15); beep(370, 0.07, 'square', 0.12, 0.1); beep(277, 0.07, 'square', 0.1, 0.2); beep(196, 0.4, 'square', 0.1, 0.3); }
                if (name === 'break') { beep(320, 0.04, 'sawtooth', 0.12); beep(220, 0.06, 'sawtooth', 0.1, 0.04); beep(160, 0.08, 'sawtooth', 0.08, 0.08); }
                if (name === 'qblock') { beep(660, 0.06, 'sine', 0.18); beep(784, 0.06, 'sine', 0.16, 0.06); beep(988, 0.12, 'sine', 0.15, 0.12); }
                if (name === 'flag') { [523, 659, 784, 1047].forEach((f, i) => beep(f, 0.12, 'sine', 0.2, i * 0.12)); }
                if (name === 'power') { [262, 330, 392, 524].forEach((f, i) => beep(f, 0.08, 'sine', 0.18, i * 0.08)); }
                if (name === '1up') { [784, 988, 784, 988, 1175, 1319].forEach((f, i) => beep(f, 0.07, 'sine', 0.18, i * 0.07)); }
            } catch (e) { }
        }

        // BGM: Mario Overworld Theme approximation
        const THEME_NOTES = [
            // freq, len (in 16ths)
            [330, 2], [0, 1], [330, 1], [0, 1], [330, 2], [0, 1], [262, 1], [330, 2], [392, 4], [196, 4],
            [262, 3], [0, 1], [196, 3], [0, 1], [164, 3], [0, 1], [220, 2], [246, 2], [233, 1], [220, 2], [0, 1],
            [196, 2], [330, 2], [392, 2], [440, 2], [349, 1], [392, 1], [0, 1], [330, 2], [0, 1],
            [262, 2], [294, 1], [247, 2], [0, 2],
            [262, 3], [0, 1], [196, 3], [0, 1], [164, 3], [0, 1], [220, 2], [246, 2], [233, 1], [220, 2], [0, 1],
            [196, 2], [330, 2], [392, 2], [440, 2], [349, 1], [392, 1], [0, 1], [330, 2], [0, 1],
            [262, 2], [294, 1], [247, 2], [0, 2],
        ];
        let bgmStep = 0, bgmTime = 0;
        const BEAT = 0.09;

        // Underground theme (darker, lower)
        const UG_NOTES = [
            [131, 2], [0, 1], [131, 1], [0, 1], [165, 2], [0, 1], [131, 1], [175, 2], [165, 2], [156, 2], [147, 4],
            [131, 2], [0, 1], [131, 1], [0, 1], [165, 2], [0, 1], [131, 1], [175, 2], [165, 2], [156, 2], [147, 4],
            [110, 2], [0, 1], [110, 1], [0, 1], [131, 2], [0, 1], [110, 1], [147, 2], [131, 2], [0, 2],
        ];

        function scheduleBGM() {
            const notes = ugMode ? UG_NOTES : THEME_NOTES;
            while (bgmTime < AC.currentTime + 0.5) {
                const [freq, len] = notes[bgmStep % notes.length];
                if (freq > 0) {
                    const o = AC.createOscillator(), g = AC.createGain();
                    o.connect(g); g.connect(bgmGain);
                    o.type = 'square'; o.frequency.value = freq;
                    g.gain.setValueAtTime(0.08, bgmTime);
                    g.gain.exponentialRampToValueAtTime(0.001, bgmTime + len * BEAT - 0.01);
                    o.start(bgmTime); o.stop(bgmTime + len * BEAT);
                }
                bgmTime += len * BEAT;
                bgmStep++;
            }
        }

        function startBGM() {
            stopBGM();
            bgmGain = AC.createGain(); bgmGain.gain.value = 1; bgmGain.connect(AC.destination);
            bgmStep = 0; bgmTime = AC.currentTime;
            scheduleBGM();
        }

        function stopBGM() {
            if (bgmGain) { bgmGain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.2); bgmGain = null; }
        }

        // ═══════════════════════════════════════════════════════════════
        // GAME STATE
        // ═══════════════════════════════════════════════════════════════
        let state = 'start', score = 0, coins = 0, lives = 3;
        let timeLeft = 400, timerTick = null, cam = 0, frame = 0;
        let shakeX = 0, shakeY = 0;
        let currentWorld = 1, currentLevel = 1; // world tracking
        let introTimer = 0; // world intro screen timer
        let goalSlide = null; // goal pole slide animation state

        const platforms = [], pipes = [], coinItems = [], enemies = [], mushrooms = [], fireballs = [], piranhas = [];
        const movingPlats = []; // moving platforms
        const springs = []; // trampolines
        const hammers = []; // Hammer Bro projectiles
        const lakitus = []; // Lakitu cloud enemies (separate - they float)
        const cannons = []; // Bullet Bill cannons
        const bulletBills = []; // Bullet Bill projectiles
        const particles = [], scorePopups = [], blockAnims = [];
        let lastFireFrame = -999;
        let ugMode = false, savedOW = null; // underground mode
        let starTimer = 0; // star power invincibility timer
        let combo = 0, comboTimer = 0; // score combo system
        let checkpoint = null, checkpointReached = false; // mid-level checkpoint
        const flagPole = { x: LW - 500, h: 320 };

        // ═══════════════════════════════════════════════════════════════
        // LEVEL BUILDER
        // ═══════════════════════════════════════════════════════════════
        function addB(x, y, type, hasMush) {
            platforms.push({ x, y, w: TILE, h: TILE, type: type === 'q' ? 'question' : type === 'g' ? 'ground' : 'brick', hit: false, hasMush: !!hasMush, bounceOffset: 0 });
        }
        function addRow(x, y, n, t, hm) { for (let i = 0; i < n; i++) addB(x + i * TILE, y, t, hm && i === Math.floor(n / 2)); }
        function addStair(x, steps, dir) { for (let i = 0; i < steps; i++) for (let j = 0; j <= i; j++) addB(x + i * TILE, H - (j + 2) * TILE, 'g'); }
        function addStairD(x, steps) { for (let i = 0; i < steps; i++) for (let j = i; j < steps; j++) addB(x + i * TILE, H - (j + 2) * TILE, 'g'); }

        function buildLevel() {
            [platforms, pipes, coinItems, enemies, mushrooms, fireballs, piranhas, particles, scorePopups, blockAnims, movingPlats, springs, cannons, bulletBills].forEach(a => a.length = 0);
            starTimer = 0; combo = 0; comboTimer = 0; checkpointReached = false; checkpoint = null; goalSlide = null;
            ugMode = false; savedOW = null;

            // Ground with 5 gaps (2 extra for chaos)
            const gaps = [{ s: 1800, e: 1900 }, { s: 3300, e: 3460 }, { s: 4300, e: 4420 }, { s: 5050, e: 5210 }, { s: 6500, e: 6660 }];
            for (let x = 0; x < LW; x += TILE)
                if (!gaps.some(g => x >= g.s && x < g.e)) platforms.push({ x, y: H - TILE, w: TILE, h: TILE, type: 'ground', bounceOffset: 0 });

            // === Zone 1: Tutorial (blocks reduced) ===
            addRow(128, H - 5 * TILE, 1, 'q'); addRow(256, H - 5 * TILE, 1, 'q', true);
            addRow(416, H - 5 * TILE, 1, 'q');
            addRow(512, H - 9 * TILE, 2, 'brick');
            addStair(640, 4, 1);
            addRow(800, H - 7 * TILE, 3, 'brick'); addRow(864, H - 11 * TILE, 2, 'q');

            // === Zone 2: Koopa hills (blocks reduced) ===
            addRow(1024, H - 5 * TILE, 1, 'q'); addRow(1152, H - 9 * TILE, 1, 'q');
            addRow(1280, H - 5 * TILE, 2, 'brick');
            addRow(1440, H - 3 * TILE, 3, 'g'); addRow(1600, H - 5 * TILE, 3, 'g');
            addRow(1920, H - 7 * TILE, 2, 'q'); addRow(2000, H - 5 * TILE, 3, 'brick');

            // === Zone 3: Elevated platforms (blocks reduced) ===
            addRow(2200, H - 5 * TILE, 1, 'q'); addRow(2300, H - 9 * TILE, 2, 'brick');
            addRow(2500, H - 5 * TILE, 3, 'brick'); addRow(2600, H - 9 * TILE, 1, 'q');
            addRow(2800, H - 3 * TILE, 3, 'g'); addRow(2900, H - 5 * TILE, 3, 'g'); addRow(3000, H - 7 * TILE, 3, 'g');
            addRow(3100, H - 5 * TILE, 2, 'q');

            // === Zone 4: Gaps (blocks reduced) ===
            addRow(3500, H - 5 * TILE, 3, 'brick'); addRow(3700, H - 9 * TILE, 2, 'q', true);
            addStairD(3900, 5);

            // === Zone 5: Mid-boss area (blocks reduced) ===
            addRow(4100, H - 5 * TILE, 4, 'brick'); addRow(4200, H - 9 * TILE, 2, 'q');
            addRow(4500, H - 9 * TILE, 3, 'brick');
            addStair(4700, 6, 1);

            // === Zone 6: After gap (blocks reduced) ===
            addRow(5300, H - 7 * TILE, 2, 'q'); addRow(5500, H - 4 * TILE, 3, 'brick');
            addRow(5600, H - 8 * TILE, 2, 'q'); addRow(5700, H - 5 * TILE, 2, 'brick');

            // === Zone 7: Final stretch (blocks reduced) ===
            addRow(5900, H - 5 * TILE, 2, 'q', true); addRow(6050, H - 9 * TILE, 2, 'brick');
            addRow(6200, H - 5 * TILE, 3, 'brick'); addRow(6300, H - 9 * TILE, 2, 'q');
            addStair(6700, 8, 1); // Big staircase to castle
            addRow(7000, H - 5 * TILE, 2, 'q');

            // Pipes: [x, height, isWarp]
            [[700, 2, false], [1400, 3, true], [2200, 2, false], [4050, 3, true], [5700, 2, false], [6300, 2, false], [7200, 4, false]].forEach(([px, ph, warp]) => {
                pipes.push({ x: px, y: H - TILE - ph * TILE, w: TILE * 2, h: ph * TILE, bounceOffset: 0, isWarp: warp });
            });

            // Piranha plants in non-warp pipes (skip pipes Mario can enter)
            pipes.forEach((p, i) => {
                if (p.isWarp) return;
                piranhas.push({ x: p.x + 8, baseY: p.y, y: p.y, w: 16, h: TILE, phase: i * 1.5, alive: true, maxUp: TILE * 1.5 });
            });

            // Coins in air (fewer, more scattered)
            for (let i = 0; i < 50; i++) coinItems.push({ x: 200 + i * 140, y: H - 10 * TILE, collected: false });

            // CHAOS enemy army: much denser, with Hammer Bros
            [
                { x: 300, t: 'goomba' }, { x: 380, t: 'goomba' }, { x: 420, t: 'goomba' }, { x: 480, t: 'koopa' },
                { x: 550, t: 'goomba' }, { x: 600, t: 'buzzy' }, { x: 680, t: 'koopa' },
                { x: 780, t: 'goomba' }, { x: 820, t: 'goomba' },
                { x: 950, t: 'hammerBro' }, // HAMMER BRO!
                { x: 1050, t: 'goomba' }, { x: 1100, t: 'buzzy' }, { x: 1150, t: 'koopa' }, { x: 1200, t: 'goomba' },
                { x: 1300, t: 'koopa' }, { x: 1350, t: 'goomba' },
                { x: 1450, t: 'koopa' }, { x: 1500, t: 'buzzy' }, { x: 1560, t: 'goomba' }, { x: 1650, t: 'koopa' },
                { x: 1750, t: 'goomba' }, { x: 1700, t: 'buzzy' },
                { x: 1950, t: 'hammerBro' }, // HAMMER BRO!
                { x: 2050, t: 'goomba' }, { x: 2100, t: 'buzzy' }, { x: 2150, t: 'koopa' },
                { x: 2250, t: 'goomba' }, { x: 2350, t: 'koopa' },
                { x: 2450, t: 'buzzy' }, { x: 2550, t: 'goomba' }, { x: 2650, t: 'koopa' },
                { x: 2750, t: 'goomba' }, { x: 2800, t: 'buzzy' },
                { x: 2900, t: 'koopa' }, { x: 3000, t: 'goomba' }, { x: 3050, t: 'goomba' }, { x: 3100, t: 'buzzy' },
                { x: 3200, t: 'hammerBro' }, // HAMMER BRO!
                { x: 3500, t: 'goomba' }, { x: 3550, t: 'koopa' },
                { x: 3600, t: 'goomba' }, { x: 3700, t: 'koopa' }, { x: 3800, t: 'buzzy' },
                { x: 3900, t: 'goomba' }, { x: 3950, t: 'goomba' }, { x: 4000, t: 'koopa' },
                { x: 4100, t: 'buzzy' }, { x: 4150, t: 'goomba' }, { x: 4250, t: 'goomba' },
                { x: 4500, t: 'hammerBro' }, // HAMMER BRO!
                { x: 4600, t: 'koopa' }, { x: 4650, t: 'goomba' }, { x: 4750, t: 'buzzy' }, { x: 4800, t: 'koopa' },
                { x: 4900, t: 'goomba' }, { x: 4950, t: 'goomba' },
                { x: 5300, t: 'buzzy' }, { x: 5350, t: 'koopa' }, { x: 5400, t: 'goomba' },
                { x: 5500, t: 'koopa' }, { x: 5550, t: 'buzzy' }, { x: 5600, t: 'goomba' },
                { x: 5700, t: 'hammerBro' }, // HAMMER BRO!
                { x: 5800, t: 'goomba' }, { x: 5850, t: 'koopa' },
                { x: 5950, t: 'goomba' }, { x: 6050, t: 'buzzy' }, { x: 6100, t: 'koopa' },
                { x: 6200, t: 'goomba' }, { x: 6250, t: 'goomba' },
                { x: 6400, t: 'koopa' }, { x: 6500, t: 'buzzy' },
                { x: 6700, t: 'goomba' }, { x: 6750, t: 'koopa' },
                { x: 6850, t: 'buzzy' }, { x: 6900, t: 'goomba' },
                { x: 7100, t: 'goomba' }, { x: 7150, t: 'koopa' }, { x: 7200, t: 'buzzy' }, { x: 7300, t: 'koopa' }
            ].forEach(({ x, t }) => {
                if (t === 'hammerBro') {
                    enemies.push({
                        x, y: H - 2.5 * TILE, w: TILE, h: TILE * 1.3,
                        vx: -0.5 + Math.random() * 1, vy: 0, alive: true, type: 'hammerBro',
                        state: 'walk', shellTimer: 0, walkFrame: 0, walkTimer: 0,
                        hammerTimer: 60 + Math.floor(Math.random() * 60), jumpTimer: 120 + Math.floor(Math.random() * 80)
                    });
                } else {
                    enemies.push({
                        x, y: H - 2 * TILE, w: TILE, h: (t === 'koopa') ? TILE * 1.2 : (t === 'buzzy') ? TILE * 0.85 : TILE,
                        vx: t === 'buzzy' ? -1.8 : -1.5, vy: 0, alive: true, type: t,
                        state: 'walk', shellTimer: 0, walkFrame: 0, walkTimer: 0
                    });
                }
            });

            // Moving platforms (more, and more falling ones)
            movingPlats.push(
                { x: 1850, y: H - 4 * TILE, w: TILE * 2.5, h: 12, type: 'h', ox: 1850, range: 60, spd: 1.8 }, // over new gap 1
                { x: 3350, y: H - 4 * TILE, w: TILE * 2.5, h: 12, type: 'h', ox: 3350, range: 120, spd: 1.5 }, // over gap 2
                { x: 4350, y: H - 4 * TILE, w: TILE * 2, h: 12, type: 'h', ox: 4350, range: 60, spd: 2.0 }, // over new gap 3
                { x: 5100, y: H - 5 * TILE, w: TILE * 2.5, h: 12, type: 'h', ox: 5100, range: 100, spd: 1.8 }, // over gap 4
                { x: 6550, y: H - 3 * TILE, w: TILE * 2, h: 12, type: 'h', ox: 6550, range: 100, spd: 1.6 }, // over gap 5
                { x: 1700, y: H - 7 * TILE, w: TILE * 2, h: 12, type: 'v', oy: H - 7 * TILE, range: 80, spd: 1.2 }, // fast elevator
                { x: 4600, y: H - 4 * TILE, w: TILE * 2, h: 12, type: 'v', oy: H - 4 * TILE, range: 100, spd: 1.3 }, // fast elevator
                // Multiple falling platforms for chaos
                { x: 2400, y: H - 8 * TILE, w: TILE * 2, h: 12, type: 'fall', fallTimer: 0, falling: false, oy: H - 8 * TILE, vy: 0 },
                { x: 3100, y: H - 6 * TILE, w: TILE * 1.5, h: 12, type: 'fall', fallTimer: 0, falling: false, oy: H - 6 * TILE, vy: 0 },
                { x: 5400, y: H - 6 * TILE, w: TILE * 1.5, h: 12, type: 'fall', fallTimer: 0, falling: false, oy: H - 6 * TILE, vy: 0 },
                { x: 6200, y: H - 7 * TILE, w: TILE * 2, h: 12, type: 'fall', fallTimer: 0, falling: false, oy: H - 7 * TILE, vy: 0 }
            );

            // Springs / Trampolines (more for chaos)
            springs.push(
                { x: 920, y: H - TILE - 24, w: 24, h: 24, compressed: 0 },
                { x: 2100, y: H - TILE - 24, w: 24, h: 24, compressed: 0 },
                { x: 3480, y: H - TILE - 24, w: 24, h: 24, compressed: 0 },
                { x: 4900, y: H - TILE - 24, w: 24, h: 24, compressed: 0 },
                { x: 5850, y: H - TILE - 24, w: 24, h: 24, compressed: 0 },
                { x: 6100, y: H - TILE - 24, w: 24, h: 24, compressed: 0 }
            );

            // Bullet Bill Cannons (new chaos element!)
            cannons.push(
                { x: 1100, y: H - TILE * 2, w: TILE, h: TILE * 2, fireRate: 150, timer: 80 },
                { x: 2700, y: H - TILE * 2, w: TILE, h: TILE * 2, fireRate: 120, timer: 60 },
                { x: 3850, y: H - TILE * 2, w: TILE, h: TILE * 2, fireRate: 130, timer: 100 },
                { x: 5000, y: H - TILE * 2, w: TILE, h: TILE * 2, fireRate: 100, timer: 50 },
                { x: 6400, y: H - TILE * 2, w: TILE, h: TILE * 2, fireRate: 110, timer: 70 }
            );

            // Checkpoint (mid-level)
            checkpoint = { x: 3800, y: H - TILE, reached: false };

            // Star block
            platforms.push({ x: 2000, y: H - 9 * TILE, w: TILE, h: TILE, type: 'question', hit: false, hasStar: true, bounceOffset: 0 });

            // 1UP hidden block
